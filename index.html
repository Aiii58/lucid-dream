<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#050514">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Onirea 3D">
<title>Onirea — Zihin Sarayı</title>
<link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="20" cy="14" r="8" fill="%23a78bfa"/><circle cx="23" cy="12" r="7" fill="%230a0a1f"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg-void:#050514;--bg-deep:#0a0a1f;--bg-surface:#14142b;--bg-elevated:#1d1d3a;
--bg-glass:rgba(40,40,80,0.32);--bg-glass-strong:rgba(50,48,96,0.55);--bg-overlay:rgba(8,8,22,0.72);
--border-faint:rgba(167,139,250,0.08);--border-soft:rgba(167,139,250,0.18);
--border-strong:rgba(167,139,250,0.32);--border-glow:rgba(167,139,250,0.55);
--text-primary:#f4f1ff;--text-body:#d8d4f0;--text-muted:#9b96c2;--text-faint:#6b6892;
--violet:#a78bfa;--violet-deep:#8b5cf6;--violet-glow:rgba(167,139,250,0.4);
--gold:#fbbf24;--gold-glow:rgba(251,191,36,0.35);--cyan:#67e8f9;--cyan-glow:rgba(103,232,249,0.35);
--rose:#fb7185;--emerald:#6ee7b7;
--font-display:'Fraunces','Cormorant Garamond',Georgia,serif;
--font-body:'Manrope',system-ui,-apple-system,sans-serif;
--r-md:14px;--r-lg:22px;--r-xl:28px;
--shadow-card:0 10px 40px -10px rgba(0,0,0,0.55);--shadow-modal:0 30px 80px -20px rgba(0,0,0,0.7);
--t-fast:160ms cubic-bezier(0.22,1,0.36,1);--t-base:280ms cubic-bezier(0.22,1,0.36,1);
--safe-top:env(safe-area-inset-top,0);--safe-bot:env(safe-area-inset-bottom,0);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:var(--font-body);background:var(--bg-void);color:var(--text-body);line-height:1.55;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
::selection{background:var(--violet);color:var(--bg-void)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-soft);border-radius:3px}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}

#canvas{position:fixed;inset:0;width:100%;height:100%;display:block;background:radial-gradient(ellipse at center,#0a0a25 0%,#020208 100%)}

.loader{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;background:var(--bg-void);transition:opacity 600ms}
.loader.hide{opacity:0;pointer-events:none}
.loader-moon{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,var(--violet) 60%,var(--violet-deep));box-shadow:0 0 40px var(--violet-glow);animation:pulse 2s ease-in-out infinite;position:relative}
.loader-moon::after{content:'';position:absolute;width:18px;height:18px;background:var(--bg-void);border-radius:50%;top:10px;right:10px}
.loader-text{font-family:var(--font-display);font-style:italic;font-size:24px;color:var(--text-primary);letter-spacing:0.04em}
.loader-sub{font-size:12px;color:var(--text-faint);letter-spacing:0.18em;text-transform:uppercase}

.top-bar{position:fixed;top:calc(var(--safe-top) + 16px);left:18px;right:18px;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;pointer-events:none}
.top-bar > *{pointer-events:auto}
.brand{display:flex;align-items:center;gap:10px;background:rgba(8,8,22,0.5);border:1px solid var(--border-soft);padding:8px 14px 8px 10px;border-radius:18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.brand-moon{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0%,var(--violet) 50%,var(--violet-deep));box-shadow:0 0 14px var(--violet-glow);animation:float 6s ease-in-out infinite;position:relative;flex-shrink:0}
.brand-moon::after{content:'';position:absolute;width:7px;height:7px;background:var(--bg-void);border-radius:50%;top:3px;right:3px}
.brand-name{font-family:var(--font-display);font-size:18px;font-style:italic;font-weight:400;color:var(--text-primary)}
.top-actions{display:flex;gap:8px}
.gear-btn{width:42px;height:42px;border-radius:50%;background:rgba(8,8,22,0.5);border:1px solid var(--border-soft);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all var(--t-fast)}
.gear-btn:hover{color:var(--violet);border-color:var(--border-glow)}
.gear-btn svg{width:18px;height:18px}

.mode-toggle{display:flex;background:rgba(8,8,22,0.5);border:1px solid var(--border-soft);border-radius:18px;padding:3px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.mode-toggle button{background:transparent;border:none;color:var(--text-muted);padding:6px 10px;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t-fast)}
.mode-toggle button:hover{color:var(--text-body)}
.mode-toggle button.active{background:var(--violet);color:var(--bg-void)}
.mode-toggle button svg{width:16px;height:16px}

.hint-bar{position:fixed;bottom:calc(var(--safe-bot) + 16px);left:50%;transform:translateX(-50%);z-index:15;display:flex;gap:6px;align-items:center;background:rgba(8,8,22,0.6);border:1px solid var(--border-soft);padding:8px 16px;border-radius:18px;font-size:11px;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-weight:500}
.hint-bar kbd{background:var(--bg-glass-strong);border:1px solid var(--border-soft);border-radius:5px;padding:1px 6px;font-family:var(--font-body);font-size:10px;color:var(--text-body);font-weight:600}
.hint-sep{color:var(--text-faint);margin:0 4px}

.label-3d{position:fixed;z-index:5;pointer-events:none;transform:translate(-50%,-100%);background:rgba(8,8,22,0.85);border:1px solid var(--border-glow);padding:7px 14px;border-radius:14px;font-size:12px;color:var(--text-primary);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 0 20px rgba(167,139,250,0.3);white-space:nowrap;opacity:0;transition:opacity 200ms;display:flex;align-items:center;gap:8px}
.label-3d.show{opacity:1}
.label-3d em{font-family:var(--font-display);font-style:italic;font-size:13px;color:var(--violet);font-weight:400}
.label-3d-key{background:linear-gradient(135deg,var(--violet),var(--violet-deep));color:var(--bg-void);font-weight:700;font-size:10px;padding:2px 6px;border-radius:6px;letter-spacing:0.06em}

.joystick-container{position:fixed;width:140px;height:140px;z-index:14;display:none;pointer-events:none;transform:translate(-50%,-50%)}
body.is-phone .joystick-container.active{display:block}
.joystick-base{position:absolute;inset:0;border-radius:50%;background:rgba(8,8,22,0.45);border:2px solid rgba(167,139,250,0.5);box-shadow:0 0 30px rgba(167,139,250,0.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.joystick-knob{position:absolute;width:62px;height:62px;top:50%;left:50%;margin:-31px 0 0 -31px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0%,var(--violet) 50%,var(--violet-deep) 100%);box-shadow:0 0 20px rgba(167,139,250,0.6);pointer-events:none}
.mobile-jump-btn{position:fixed;bottom:calc(var(--safe-bot) + 36px);right:22px;width:78px;height:78px;border-radius:50%;background:rgba(167,139,250,0.20);border:2px solid var(--border-glow);color:var(--violet);display:none;align-items:center;justify-content:center;z-index:14;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 0 20px rgba(167,139,250,0.2);user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;transition:transform var(--t-fast),background var(--t-fast)}
.mobile-jump-btn:active{background:var(--violet);color:var(--bg-void);transform:scale(0.94)}
.mobile-jump-btn svg{width:30px;height:30px}
body.is-phone .mobile-jump-btn{display:flex}
body.is-phone .hint-bar{display:none}

.panel-overlay{position:fixed;inset:0;z-index:30;display:none;background:linear-gradient(180deg,rgba(5,5,20,0.7),rgba(5,5,20,0.92));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);animation:fade-in var(--t-base)}
.panel-overlay.show{display:flex;flex-direction:column}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 16px) 22px 12px;flex-shrink:0}
.panel-title{font-family:var(--font-display);font-style:italic;font-size:28px;font-weight:300;color:var(--text-primary);letter-spacing:-0.01em;line-height:1}
.panel-title em{color:var(--violet);font-style:italic;font-weight:400}
.panel-sub{font-family:var(--font-display);font-style:italic;font-size:13px;color:var(--text-faint);margin-top:4px}
.panel-close{background:var(--bg-glass);border:1px solid var(--border-soft);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);backdrop-filter:blur(8px);transition:all var(--t-fast);flex-shrink:0}
.panel-close:hover{color:var(--rose);border-color:var(--rose)}
.panel-close svg{width:18px;height:18px}
.panel-body{flex:1;overflow-y:auto;padding:6px 22px calc(var(--safe-bot) + 28px);max-width:760px;width:100%;margin:0 auto}
@media (min-width:600px){.panel-head{padding-left:36px;padding-right:36px}.panel-body{padding-left:36px;padding-right:36px}}

.card{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all var(--t-base);position:relative;overflow:hidden}
.card:hover{border-color:var(--border-strong);transform:translateY(-1px)}
.card-elevated{background:var(--bg-glass-strong);box-shadow:var(--shadow-card)}

.btn{font-family:var(--font-body);font-size:14px;font-weight:600;padding:11px 18px;border-radius:var(--r-md);border:1px solid var(--border-soft);background:var(--bg-glass);color:var(--text-body);cursor:pointer;transition:all var(--t-fast);display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn:hover{background:var(--bg-glass-strong);border-color:var(--border-strong);transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--violet),var(--violet-deep));color:var(--bg-void);border-color:transparent;font-weight:700;box-shadow:0 4px 20px -4px var(--violet-glow)}
.btn-primary:hover{background:linear-gradient(135deg,#b89cff,#9d6cff)}
.btn-ghost{background:transparent;border-color:var(--border-faint);color:var(--text-muted)}
.btn-ghost:hover{color:var(--text-body);border-color:var(--border-soft)}
.btn-danger{background:rgba(251,113,133,0.1);border-color:rgba(251,113,133,0.3);color:var(--rose)}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-lg{padding:14px 24px;font-size:15px}
.btn svg{width:16px;height:16px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg-deep);border:1px solid var(--border-soft);border-radius:var(--r-md);color:var(--text-primary);padding:12px 14px;font-family:var(--font-body);font-size:14px;transition:all var(--t-fast);outline:none}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--border-glow);box-shadow:0 0 0 3px rgba(167,139,250,0.12);background:var(--bg-surface)}
.form-textarea{min-height:110px;resize:vertical;line-height:1.6}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-faint)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text-faint);margin-top:6px;font-style:italic}

.lucidity-dial{display:flex;gap:6px;justify-content:space-between;background:var(--bg-deep);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:12px}
.moon-pip{flex:1;aspect-ratio:1;max-width:38px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-soft);cursor:pointer;transition:all var(--t-fast)}
.moon-pip[data-active="true"]{background:radial-gradient(circle at 35% 30%,#fff 0%,var(--violet) 60%,var(--violet-deep) 100%);border-color:var(--violet);box-shadow:0 0 12px var(--violet-glow)}
.moon-pip:hover{transform:scale(1.08);border-color:var(--border-strong)}
.lucidity-meaning{margin-top:10px;font-size:12px;color:var(--text-muted);font-style:italic;font-family:var(--font-display);line-height:1.5;min-height:18px}

.viv-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:linear-gradient(to right,#383852 0%,var(--violet) var(--viv,50%),#1a1a2e var(--viv,50%));outline:none}
.viv-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0%,var(--violet) 60%,var(--violet-deep) 100%);cursor:pointer;box-shadow:0 0 12px var(--violet-glow);border:none}
.viv-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0%,var(--violet) 60%);cursor:pointer;border:none}
.viv-display{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text-muted)}
.viv-value{font-family:var(--font-display);font-size:22px;font-style:italic;color:var(--violet)}

.chip-input-wrap{background:var(--bg-deep);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;transition:all var(--t-fast)}
.chip-input-wrap:focus-within{border-color:var(--border-glow);box-shadow:0 0 0 3px rgba(167,139,250,0.12)}
.chip{background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);color:var(--violet);padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.chip.cyan{background:rgba(103,232,249,0.12);border-color:rgba(103,232,249,0.3);color:var(--cyan)}
.chip-x{cursor:pointer;opacity:0.6;font-size:14px;line-height:1}
.chip-x:hover{opacity:1}
.chip-input{flex:1;min-width:80px;background:transparent;border:none;color:var(--text-primary);outline:none;padding:4px 6px;font-size:13px;font-family:var(--font-body)}

.dream-card{position:relative;margin-bottom:12px;cursor:pointer;animation:fade-up var(--t-base) both}
.dream-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
.dream-card-title{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--text-primary);line-height:1.3}
.dream-card-date{font-size:11px;color:var(--text-faint);letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;margin-top:4px}
.dream-card-body{font-size:14px;color:var(--text-muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.dream-card-meta{display:flex;gap:14px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border-faint);flex-wrap:wrap}
.dream-card-mini-moons{display:flex;gap:2px}
.mini-moon{width:8px;height:8px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-soft)}
.mini-moon.on{background:radial-gradient(circle at 35% 30%,#fff 0%,var(--violet) 70%);border-color:var(--violet);box-shadow:0 0 5px var(--violet-glow)}
.dream-meta-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-faint)}
.dream-meta-item svg{width:12px;height:12px}
.dream-card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag-mini{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(167,139,250,0.1);color:var(--violet);border:1px solid rgba(167,139,250,0.2)}
.lucid-badge{position:absolute;top:12px;right:12px;padding:3px 9px;background:linear-gradient(135deg,var(--gold),#f59e0b);color:var(--bg-void);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border-radius:10px;box-shadow:0 0 14px var(--gold-glow)}

.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding:4px 2px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-pill{background:var(--bg-glass);border:1px solid var(--border-soft);color:var(--text-muted);padding:6px 14px;border-radius:14px;font-size:12px;font-weight:500;cursor:pointer;transition:all var(--t-fast);white-space:nowrap}
.filter-pill.active{background:var(--violet);color:var(--bg-void);border-color:var(--violet);box-shadow:0 0 12px var(--violet-glow)}

.dream-controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.dream-control{display:flex;align-items:center;gap:8px;background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:6px 12px;flex:1;min-width:180px;transition:all var(--t-fast)}
.dream-control:hover{border-color:var(--border-strong)}
.dream-control:focus-within{border-color:var(--border-glow);box-shadow:0 0 0 3px rgba(167,139,250,0.12)}
.dream-control-label{font-size:10px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;font-weight:600;flex-shrink:0}
.dream-control select,.dream-control input[type="date"]{background:transparent;border:none;color:var(--text-primary);padding:6px 2px;font-family:var(--font-body);font-size:13px;outline:none;cursor:pointer;flex:1;min-width:0}
.dream-control input[type="date"]{font-size:12px;color-scheme:dark}
.dream-control input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7);cursor:pointer;opacity:0.7}
.dream-control input[type="date"]::-webkit-calendar-picker-indicator:hover{opacity:1}
.dream-control select option{background:var(--bg-surface);color:var(--text-primary)}
.dream-control-clear{background:transparent;border:none;color:var(--text-faint);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:6px;flex-shrink:0;transition:all var(--t-fast)}
.dream-control-clear:hover{color:var(--rose);background:rgba(251,113,133,0.1)}

.search-bar{position:relative;margin-bottom:14px}
.search-bar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-faint);pointer-events:none}
.search-input{width:100%;background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:11px 14px 11px 40px;color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;transition:all var(--t-fast)}
.search-input:focus{border-color:var(--border-glow);box-shadow:0 0 0 3px rgba(167,139,250,0.12)}

.empty{text-align:center;padding:50px 24px;color:var(--text-muted)}
.empty-icon{width:64px;height:64px;margin:0 auto 18px;opacity:0.4;color:var(--violet)}
.empty-title{font-family:var(--font-display);font-size:22px;font-style:italic;color:var(--text-body);margin-bottom:6px}
.empty-text{font-size:13px;line-height:1.6;max-width:280px;margin:0 auto 18px;color:var(--text-faint)}

.luci-hero{background:linear-gradient(135deg,rgba(139,92,246,0.12),rgba(103,232,249,0.06));border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:22px;margin-bottom:18px;position:relative;overflow:hidden}
.luci-hero h3{font-family:var(--font-display);font-size:20px;font-style:italic;color:var(--text-primary);margin-bottom:6px}
.luci-hero p{font-size:13px;color:var(--text-muted);line-height:1.65}
.luci-hero strong{color:var(--violet);font-weight:600}

.palace-card{position:relative;margin-bottom:12px;cursor:pointer;animation:fade-up var(--t-base) both}
.palace-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--violet),var(--cyan));opacity:0;transition:opacity var(--t-fast);border-radius:var(--r-lg) 0 0 var(--r-lg)}
.palace-card:hover::before{opacity:1}
.palace-card::after{content:'↗ ışınlan';position:absolute;right:14px;bottom:10px;font-size:10px;letter-spacing:0.12em;color:var(--violet);opacity:0;transition:opacity var(--t-fast);text-transform:uppercase;font-weight:600}
.palace-card:hover::after{opacity:0.8}
.palace-card-head{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.palace-icon{width:44px;height:44px;flex-shrink:0;border-radius:12px;background:linear-gradient(135deg,rgba(167,139,250,0.2),rgba(167,139,250,0.05));border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;color:var(--violet)}
.palace-icon svg{width:22px;height:22px}
.palace-info{flex:1;min-width:0}
.palace-name{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--text-primary);margin-bottom:2px}
.palace-stats{font-size:11px;color:var(--text-faint)}
.palace-stats strong{color:var(--violet);font-weight:600}
.palace-desc{font-size:13px;color:var(--text-muted);font-style:italic;font-family:var(--font-display);padding-top:8px;border-top:1px dashed var(--border-faint)}

.palace-detail-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back-btn{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:12px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all var(--t-fast);flex-shrink:0}
.back-btn:hover{color:var(--violet);border-color:var(--violet)}
.back-btn svg{width:18px;height:18px}
.detail-title{font-family:var(--font-display);font-size:24px;font-weight:400;font-style:italic;color:var(--text-primary);flex:1;min-width:0}

.room-card{margin-bottom:12px;cursor:pointer;animation:fade-up var(--t-base) both}
.room-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.room-name{font-family:var(--font-display);font-size:17px;font-weight:500;color:var(--text-primary)}
.room-spots-count{font-size:11px;color:var(--violet);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.25);padding:2px 9px;border-radius:10px}
.room-desc{font-size:13px;color:var(--text-muted);font-style:italic;font-family:var(--font-display);line-height:1.5}

.spot-card{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;animation:fade-up var(--t-base) both}
.spot-num{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--violet),var(--violet-deep));color:var(--bg-void);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.spot-content{flex:1;min-width:0}
.spot-location{font-weight:600;font-size:14px;color:var(--text-primary);margin-bottom:3px}
.spot-memory{font-size:13px;color:var(--text-muted);line-height:1.5}
.spot-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:transparent;border:none;color:var(--text-faint);cursor:pointer;padding:4px;border-radius:6px;transition:all var(--t-fast)}
.icon-btn:hover{color:var(--violet);background:rgba(167,139,250,0.1)}
.icon-btn.danger:hover{color:var(--rose);background:rgba(251,113,133,0.1)}
.icon-btn svg{width:16px;height:16px;display:block}

.practice-stage{background:var(--bg-glass-strong);border:1px solid var(--border-strong);border-radius:var(--r-lg);padding:28px 22px;text-align:center;margin-bottom:18px;position:relative;min-height:220px;display:flex;flex-direction:column;justify-content:center}
.practice-step{font-size:11px;color:var(--text-faint);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:12px}
.practice-location{font-family:var(--font-display);font-size:28px;font-style:italic;color:var(--text-primary);margin-bottom:10px;line-height:1.3}
.practice-room-tag{display:inline-block;font-size:11px;color:var(--cyan);background:rgba(103,232,249,0.1);border:1px solid rgba(103,232,249,0.25);padding:3px 10px;border-radius:10px;margin-bottom:18px}
.practice-memory{font-size:16px;color:var(--violet);font-family:var(--font-display);font-style:italic;line-height:1.5;margin-top:12px;padding-top:14px;border-top:1px dashed var(--border-soft);animation:fade-up var(--t-base)}
.practice-progress{display:flex;gap:4px;justify-content:center;margin-bottom:14px}
.progress-pip{width:8px;height:8px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-soft)}
.progress-pip.done{background:var(--emerald);border-color:var(--emerald)}
.progress-pip.skip{background:var(--rose);border-color:var(--rose)}
.progress-pip.now{background:var(--violet);border-color:var(--violet);box-shadow:0 0 8px var(--violet-glow)}
.practice-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.practice-summary{text-align:center;padding:30px 20px}
.practice-score{font-family:var(--font-display);font-size:56px;color:var(--violet);font-style:italic;font-weight:300;line-height:1;margin-bottom:8px}
.practice-score-label{font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:24px}

.tech-card{margin-bottom:14px}
.tech-card-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer}
.tech-abbrev{width:50px;height:50px;flex-shrink:0;border-radius:14px;background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(251,191,36,0.04));border:1px solid rgba(251,191,36,0.25);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-style:italic;font-weight:600;color:var(--gold);font-size:14px}
.tech-name{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--text-primary)}
.tech-tag{font-size:11px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase}
.tech-content{font-size:13.5px;color:var(--text-body);line-height:1.65}
.tech-content ol,.tech-content ul{margin-left:18px;margin-top:8px}
.tech-content li{margin-bottom:5px}
.tech-content strong{color:var(--violet);font-weight:600}
.tech-toggle{margin-left:auto;color:var(--text-faint);transition:transform var(--t-fast)}
.tech-card[data-open="true"] .tech-toggle{transform:rotate(180deg)}

.rc-card{margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.rc-num{width:30px;height:30px;flex-shrink:0;border-radius:50%;background:var(--bg-deep);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);color:var(--text-muted);font-size:13px;font-style:italic}
.rc-card.active .rc-num{background:linear-gradient(135deg,var(--cyan),#06b6d4);border-color:var(--cyan);color:var(--bg-void);box-shadow:0 0 12px var(--cyan-glow)}
.rc-content{flex:1}
.rc-name{font-weight:600;font-size:14px;color:var(--text-primary);margin-bottom:2px}
.rc-desc{font-size:12.5px;color:var(--text-muted);line-height:1.55}
.rc-reminder{background:linear-gradient(135deg,rgba(103,232,249,0.10),rgba(167,139,250,0.06));border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
.rc-reminder-toggle{display:flex;align-items:center;justify-content:space-between;gap:12px}
.rc-reminder-info{flex:1}
.rc-reminder-title{font-family:var(--font-display);font-size:17px;color:var(--text-primary);margin-bottom:3px}
.rc-reminder-desc{font-size:12px;color:var(--text-muted);line-height:1.5}
.rc-current{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border-faint);display:none}
.rc-current.show{display:block;animation:fade-in var(--t-base)}
.rc-current-label{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:6px}
.rc-current-text{font-family:var(--font-display);font-style:italic;font-size:16px;color:var(--text-primary)}

.switch{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-slider{position:absolute;cursor:pointer;inset:0;background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:14px;transition:var(--t-fast)}
.switch-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:2px;background:var(--text-muted);border-radius:50%;transition:var(--t-fast)}
.switch input:checked + .switch-slider{background:linear-gradient(135deg,var(--violet),var(--violet-deep));border-color:var(--violet)}
.switch input:checked + .switch-slider::before{transform:translateX(19px);background:white}

.subtabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg-glass);border:1px solid var(--border-soft);padding:4px;border-radius:var(--r-md)}
.subtab{flex:1;background:transparent;border:none;color:var(--text-muted);padding:8px 10px;border-radius:10px;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--t-fast)}
.subtab.active{background:var(--bg-elevated);color:var(--violet)}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{padding:16px;background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:var(--r-md)}
.stat-card.span2{grid-column:span 2}
.stat-value{font-family:var(--font-display);font-size:36px;font-weight:300;color:var(--text-primary);line-height:1;font-style:italic}
.stat-value.violet{color:var(--violet)}
.stat-value.gold{color:var(--gold)}
.stat-value.cyan{color:var(--cyan)}
.stat-value.emerald{color:var(--emerald)}
.stat-label{font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:6px}
.stat-sub{font-size:11px;color:var(--text-faint);margin-top:4px}

.bar-chart{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:16px;margin-bottom:14px}
.bar-chart-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;font-weight:600}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px}
.bar-label{width:90px;color:var(--text-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--bg-deep);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(to right,var(--violet-deep),var(--violet));border-radius:4px}
.bar-count{width:24px;text-align:right;color:var(--text-muted);font-weight:600}
.trend-chart{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:16px;margin-bottom:14px}
.trend-chart svg{width:100%;height:90px;display:block;margin-top:6px}

.settings-group{margin-bottom:18px}
.settings-group-title{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;padding-left:6px;font-weight:600}
.settings-row{background:var(--bg-glass);border:1px solid var(--border-soft);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:all var(--t-fast)}
.settings-row:first-child{border-radius:var(--r-md) var(--r-md) 0 0}
.settings-row:last-child{border-radius:0 0 var(--r-md) var(--r-md)}
.settings-row:only-child{border-radius:var(--r-md)}
.settings-row:not(:first-child){border-top:none}
.settings-row:hover{background:var(--bg-glass-strong)}
.settings-row-info{flex:1;min-width:0}
.settings-row-title{font-size:14px;color:var(--text-primary);font-weight:500}
.settings-row-desc{font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.4}
.settings-row select{background:var(--bg-deep);border:1px solid var(--border-soft);color:var(--text-primary);padding:6px 10px;border-radius:8px;font-size:13px;outline:none;cursor:pointer}

.epigraph{font-family:var(--font-display);font-style:italic;font-size:14px;color:var(--text-faint);text-align:center;padding:14px 24px;border-top:1px dashed var(--border-faint);margin-top:24px;line-height:1.65}
.epigraph cite{display:block;margin-top:4px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);font-style:normal;font-family:var(--font-body)}

.modal-backdrop{position:fixed;inset:0;background:var(--bg-overlay);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:60;display:none;animation:fade-in var(--t-fast);padding:16px;overflow-y:auto}
.modal-backdrop.show{display:flex;align-items:flex-start;justify-content:center}
.modal{width:100%;max-width:540px;background:var(--bg-surface);border:1px solid var(--border-soft);border-radius:var(--r-xl);box-shadow:var(--shadow-modal);margin:40px auto;overflow:hidden;animation:fade-up var(--t-base)}
.modal-head{padding:18px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-family:var(--font-display);font-size:22px;font-style:italic;color:var(--text-primary)}
.modal-close{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);flex-shrink:0}
.modal-close:hover{color:var(--rose);border-color:var(--rose)}
.modal-close svg{width:16px;height:16px}
.modal-body{padding:18px 22px}
.modal-foot{padding:14px 22px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border-faint);background:rgba(8,8,22,0.4)}
.modal-sm{max-width:380px}

.detail-meta{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.detail-meta-item{display:flex;align-items:center;gap:6px}
.detail-meta-item strong{color:var(--text-body);font-weight:600}
.detail-content{font-size:14.5px;line-height:1.7;color:var(--text-body);white-space:pre-wrap;word-wrap:break-word}
.detail-section-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);margin-top:14px;margin-bottom:6px;font-weight:600}
.detail-chips{display:flex;flex-wrap:wrap;gap:5px}

.toast{position:fixed;bottom:calc(70px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-elevated);border:1px solid var(--border-strong);color:var(--text-primary);padding:11px 18px;border-radius:14px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:all var(--t-base);pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(251,113,133,0.5);color:var(--rose)}
.toast.success{border-color:rgba(110,231,183,0.5);color:var(--emerald)}

.error-screen{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:var(--bg-void);padding:24px;text-align:center}
.error-screen.show{display:flex}
.error-screen h2{font-family:var(--font-display);font-style:italic;color:var(--rose);margin-bottom:10px;font-size:24px}
.error-screen p{color:var(--text-muted);max-width:380px;line-height:1.6;font-size:14px}

#photoRoomOverlay{position:fixed;inset:0;z-index:8500;background:#000;opacity:0;transition:opacity 400ms ease;pointer-events:none}
#photoRoomOverlay.show{opacity:1;pointer-events:auto}
.photo-room-img{width:100%;height:100%;object-fit:contain;display:block;background:#000}
.photo-room-exit{position:absolute;top:max(20px,env(safe-area-inset-top));left:20px;background:rgba(15,15,23,0.55);color:#f5f5f5;border:1px solid rgba(255,255,255,0.14);padding:10px 16px;border-radius:12px;cursor:pointer;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-family:var(--font-display);font-size:14px;font-style:italic;letter-spacing:0.04em;transition:background 200ms;z-index:1}
.photo-room-exit:hover{background:rgba(15,15,23,0.78)}
.photo-room-name{position:absolute;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);color:rgba(245,245,245,0.92);font-family:var(--font-display);font-size:18px;font-style:italic;background:rgba(15,15,23,0.5);padding:8px 20px;border-radius:14px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);letter-spacing:0.06em;pointer-events:none}


.ios-slider-row{display:flex;flex-direction:column;gap:14px;width:100%;margin-top:6px}
.ios-slider-head{display:flex;justify-content:space-between;align-items:baseline}
.ios-slider-current{font-family:var(--font-display);font-size:30px;color:var(--violet);font-style:italic;line-height:1}
.ios-slider-unit{font-size:13px;color:var(--text-muted);margin-left:4px;letter-spacing:0.05em}
.ios-slider-bounds{font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase}
.ios-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:rgba(255,255,255,0.10);border-radius:2px;outline:none;background-image:linear-gradient(to right,var(--violet),var(--violet));background-repeat:no-repeat;margin:0;padding:0}
.ios-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;background:#fff;border-radius:50%;cursor:grab;border:0;box-shadow:0 1px 4px rgba(0,0,0,0.45),0 6px 14px rgba(0,0,0,0.25)}
.ios-slider::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.08)}
.ios-slider::-moz-range-thumb{width:28px;height:28px;background:#fff;border-radius:50%;cursor:grab;border:0;box-shadow:0 1px 4px rgba(0,0,0,0.45),0 6px 14px rgba(0,0,0,0.25)}
.ios-slider::-moz-range-track{background:transparent}
.settings-row.is-column{flex-direction:column;align-items:stretch;cursor:default}
.settings-row.is-column .settings-row-info{margin-bottom:2px}


.difficulty-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.difficulty-chip{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:14px;padding:14px 12px;cursor:pointer;color:var(--text-primary);transition:all var(--t-fast);text-align:left;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.difficulty-chip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--violet));opacity:0.85;transition:width 200ms}
.difficulty-chip:hover:not(:disabled){background:var(--bg-glass-strong);transform:translateY(-1px)}
.difficulty-chip:hover:not(:disabled)::before{width:5px}
.difficulty-chip:disabled{opacity:0.4;cursor:not-allowed}
.difficulty-chip .dc-name{font-family:var(--font-display);font-style:italic;font-size:18px;letter-spacing:0.02em}
.difficulty-chip .dc-range{font-size:11.5px;color:var(--text-muted);letter-spacing:0.04em}
.difficulty-chip.diff-kolay{--c:#34d399}
.difficulty-chip.diff-orta{--c:#67e8f9}
.difficulty-chip.diff-zor{--c:#fbbf24}
.difficulty-chip.diff-cokzor{--c:#fb7185}

.gorev-warning{background:rgba(251,146,60,0.10);border:1px solid rgba(251,146,60,0.30);color:#fed7aa;padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.55;margin-bottom:14px}
.gorev-warning .link{color:#fdba74}

.gorev-result{background:linear-gradient(180deg,rgba(255,143,177,0.06),rgba(167,139,250,0.04));border:1px solid var(--border-soft);border-radius:14px;padding:16px;margin-bottom:18px}
.gorev-result.hidden{display:none}
.gorev-result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.gorev-result-text{font-size:14.5px;line-height:1.78;color:var(--text-primary);font-family:var(--font-display);font-style:italic;letter-spacing:0.01em;white-space:pre-wrap}
.gorev-loading{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:13px}
.gorev-loading em{font-style:italic}
.gorev-error{color:#fda4af;font-size:13px;background:rgba(251,113,133,0.08);padding:10px 12px;border-radius:10px;border:1px solid rgba(251,113,133,0.25)}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(167,139,250,0.25);border-top-color:var(--violet);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.gorev-badge{display:inline-block;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}
.gorev-badge.mini{padding:2px 8px;font-size:10px}
.gorev-badge.diff-kolay{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3)}
.gorev-badge.diff-orta{background:rgba(103,232,249,0.15);color:#67e8f9;border:1px solid rgba(103,232,249,0.3)}
.gorev-badge.diff-zor{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.gorev-badge.diff-cokzor{background:rgba(251,113,133,0.15);color:#fb7185;border:1px solid rgba(251,113,133,0.3)}

.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border-soft);padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;transition:all var(--t-fast)}
.btn-ghost:hover{background:var(--bg-glass);color:var(--text-primary)}

.gorev-history-item{background:var(--bg-glass);border:1px solid var(--border-soft);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ghi-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ghi-date{flex:1;font-size:11px;color:var(--text-muted)}
.ghi-delete{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;opacity:0.5}
.ghi-delete:hover{opacity:1;color:#fb7185}
.ghi-text{font-size:13px;line-height:1.6;color:var(--text-primary);font-style:italic;opacity:0.88}

.text-input{background:var(--bg-deep);border:1px solid var(--border-soft);color:var(--text-primary);padding:10px 12px;border-radius:10px;font-size:13px;outline:none;font-family:inherit;width:100%;box-sizing:border-box;transition:border-color var(--t-fast)}
.text-input:focus{border-color:var(--violet)}
.link{color:var(--violet);text-decoration:none}
.link:hover{text-decoration:underline}
.section-title{font-family:var(--font-display);font-style:italic;font-size:16px;color:var(--text-primary);margin:0 0 10px 0;letter-spacing:0.02em}


.ghi-star{background:transparent;border:none;color:rgba(245,245,245,0.35);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;transition:color 200ms,transform 100ms}
.ghi-star:hover{color:#fbbf24;transform:scale(1.18)}
.ghi-star:active{transform:scale(0.92)}
.ghi-star.active{color:#fbbf24}
.btn-ghost.star-btn.starred{background:rgba(251,191,36,0.15);color:#fbbf24;border-color:rgba(251,191,36,0.4)}
.btn-ghost.star-btn:hover{background:rgba(251,191,36,0.08);color:#fbbf24}


.starred-box{background:linear-gradient(180deg,rgba(251,191,36,0.06),rgba(251,191,36,0.02));border:1px solid rgba(251,191,36,0.28);border-radius:14px;margin-top:18px;margin-bottom:8px;overflow:hidden}
.starred-box-header{width:100%;background:transparent;border:none;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:inherit;color:var(--text-primary);font-size:14px;transition:background var(--t-fast)}
.starred-box-header:hover{background:rgba(251,191,36,0.05)}
.sbh-left{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-style:italic;font-size:15px}
.sbh-right{display:flex;align-items:center;gap:8px}
.star-icon{color:#fbbf24;font-size:16px}
.starred-box .count{background:rgba(251,191,36,0.18);color:#fbbf24;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:0.05em;font-family:var(--font-system,sans-serif);font-style:normal}
.chevron{color:var(--text-muted);transition:transform 200ms;font-size:14px;display:inline-block}
.starred-box.open .chevron{transform:rotate(180deg)}
.starred-box-content{display:none;padding:0 14px 14px}
.starred-box.open .starred-box-content{display:block}

.gorev-type-badge{display:inline-block;padding:3px 9px;border-radius:9px;font-size:10.5px;letter-spacing:0.05em;background:rgba(167,139,250,0.12);color:#c4b5fd;border:1px solid rgba(167,139,250,0.25);font-weight:500}
.gorev-type-badge.mini{padding:2px 7px;font-size:9.5px}

</style>
</head>

</div>

<div class="hint-bar" id="hintBar">
  <kbd>WASD</kbd> Gez <span class="hint-sep">·</span> <kbd>Space</kbd> Zıpla <span class="hint-sep">·</span> Sürükle Bak <span class="hint-sep">·</span> <kbd>E</kbd> Etkileş

  <div class="joystick-base"></div>
  <div class="joystick-knob"></div>
</div>
<button class="mobile-jump-btn" id="mobileJumpBtn" aria-label="Zıpla">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14V4M7 9l5-5 5 5M5 19h14"/></svg>
</button>

<div class="panel-overlay" id="panelOverlay">
  <div class="panel-head">
    <div>
      <div class="panel-title" id="panelTitle"></div>
      <div class="panel-sub" id="panelSub"></div>
    </div>
    <button class="panel-close" id="panelClose" aria-label="Kapat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<div class="modal-backdrop" id="modal"></div>
<div class="toast" id="toast"></div>

const STORAGE_KEY = 'onirea_v1';
const defaultState = {
  dreams: [], palaces: [], gorevler: [],
  settings: { rcEnabled:false, rcInterval:60, rcLastShown:0, activeRCs:[0,1,2,3,4], geminiKey:'', geminiModel:'gemini-2.5-flash' }
};

function loadState(){
  try{ const r=localStorage.getItem(STORAGE_KEY);
    if(!r) return structuredClone(defaultState);
    const p=JSON.parse(r);
    return {...structuredClone(defaultState),...p,settings:{...defaultState.settings,...(p.settings||{})}};
  }catch(e){ return structuredClone(defaultState); }
}
function saveState(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){ toast('Kaydedilemedi','error'); } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,9); }

// ===== UTIL =====
function formatDate(ts){
  const d=new Date(ts), m=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
}
function formatDateShort(ts){
  const d=new Date(ts), today=new Date(), yest=new Date(); yest.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'Bugün';
  if(d.toDateString()===yest.toDateString()) return 'Dün';
  const diff=Math.floor((today-d)/86400000);
  if(diff<7) return diff+' gün önce';
  return formatDate(ts);
}
function formatDateInput(ts){
  const d=new Date(ts), pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.remove('show'),2400);
}

function init3D(){
  if(typeof THREE==='undefined'){
    document.getElementById('errorScreen').classList.add('show');
    document.getElementById('loader').classList.add('hide');
    return false;
  }
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x050514,0.045);
  camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,100);
  camera.position.set(0,4,7);
  camera.lookAt(0,1,0);
  const canvas=document.getElementById('canvas');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setClearColor(0x050514,1);
  clock=new THREE.Clock();
  raycaster=new THREE.Raycaster();
  mouse=new THREE.Vector2();
  buildRoom(); buildLights(); buildCharacter(); buildInteractives(); buildDust();
  // Group home room objects for scene switching
  homeRoomGroup=new THREE.Group();
  const homeChildren=[];
  scene.children.forEach(c=>{
    if(c!==character&&c!==dustParticles&&!c.isAmbientLight&&!c.isHemisphereLight)
      homeChildren.push(c);
  });
  homeChildren.forEach(c=>{ scene.remove(c); homeRoomGroup.add(c); });
  scene.add(homeRoomGroup);
  homeInteractives=[...interactives];
  window.addEventListener('resize',onResize);
  window.addEventListener('keydown',onKeyDown);
  window.addEventListener('keyup',onKeyUp);
  canvas.addEventListener('mousedown',onMouseDown);
  window.addEventListener('mousemove',onMouseMove);
  window.addEventListener('mouseup',onMouseUp);
  canvas.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.addEventListener('touchmove',onTouchMove,{passive:false});
  canvas.addEventListener('touchend',onTouchEnd);
  canvas.addEventListener('wheel',onWheel,{passive:false});
  setupMobileControls();
  animate();
  return true;
}
function onResize(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

// ===== ROOM =====
function buildRoom(){
  const half=ROOM_SIZE/2;
  const floorTex=makeFloorTex();
  const floor=new THREE.Mesh(
    new THREE.PlaneGeometry(ROOM_SIZE,ROOM_SIZE),
    new THREE.MeshStandardMaterial({map:floorTex,color:0x1a1830,roughness:0.85,metalness:0.15})
  );
  floor.rotation.x=-Math.PI/2; scene.add(floor);
  const ceiling=new THREE.Mesh(
    new THREE.PlaneGeometry(ROOM_SIZE,ROOM_SIZE),
    new THREE.MeshStandardMaterial({map:makeCeilingTex(),color:0x080816,roughness:0.95})
  );
  ceiling.rotation.x=Math.PI/2; ceiling.position.y=WALL_HEIGHT; scene.add(ceiling);
  const wallMat=new THREE.MeshStandardMaterial({map:makeWallTex(),color:0x1a1730,roughness:0.9,metalness:0.1});
  const nW=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE,WALL_HEIGHT),wallMat);
  nW.position.set(0,WALL_HEIGHT/2,-half); scene.add(nW);
  const sW=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE,WALL_HEIGHT),wallMat.clone());
  sW.rotation.y=Math.PI; sW.position.set(0,WALL_HEIGHT/2,half); scene.add(sW);
  const eW=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE,WALL_HEIGHT),wallMat.clone());
  eW.rotation.y=-Math.PI/2; eW.position.set(half,WALL_HEIGHT/2,0); scene.add(eW);
  const wW=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE,WALL_HEIGHT),wallMat.clone());
  wW.rotation.y=Math.PI/2; wW.position.set(-half,WALL_HEIGHT/2,0); scene.add(wW);
  // Center stage rings
  const ringMat=new THREE.MeshBasicMaterial({color:0x4a3a8a,transparent:true,opacity:0.5,side:THREE.DoubleSide});
  const ring=new THREE.Mesh(new THREE.RingGeometry(2.4,2.6,64),ringMat);
  ring.rotation.x=-Math.PI/2; ring.position.y=0.01; scene.add(ring);
  const ring2=new THREE.Mesh(new THREE.RingGeometry(0.8,0.85,32),ringMat.clone());
  ring2.rotation.x=-Math.PI/2; ring2.position.y=0.01; scene.add(ring2);
  // South wall window with stars
  const win=new THREE.Mesh(new THREE.PlaneGeometry(4,2.8),
    new THREE.MeshBasicMaterial({map:makeStarsTex()}));
  win.position.set(0,2.8,half-0.02); win.rotation.y=Math.PI; scene.add(win);
  const fMat=new THREE.MeshStandardMaterial({color:0x2a2545,roughness:0.6,metalness:0.4});
  const addBar=(g,x,y)=>{ const b=new THREE.Mesh(g,fMat); b.position.set(x,y,half-0.05); scene.add(b); };
  addBar(new THREE.BoxGeometry(4.3,0.12,0.1),0,4.25);
  addBar(new THREE.BoxGeometry(4.3,0.12,0.1),0,1.35);
  addBar(new THREE.BoxGeometry(0.12,2.95,0.1),-2.1,2.8);
  addBar(new THREE.BoxGeometry(0.12,2.95,0.1),2.1,2.8);
  addBar(new THREE.BoxGeometry(0.08,2.95,0.1),0,2.8);
  const wL=new THREE.PointLight(0x8b9cff,0.6,8); wL.position.set(0,3,half-1); scene.add(wL);
}
function makeFloorTex(){
  const c=document.createElement('canvas'); c.width=c.height=512;
  const g=c.getContext('2d');
  g.fillStyle='#0e0c1f'; g.fillRect(0,0,512,512);
  for(let i=0;i<3000;i++){
    g.fillStyle=`rgba(${20+Math.random()*30},${15+Math.random()*25},${50+Math.random()*40},${Math.random()*0.4})`;
    g.fillRect(Math.random()*512,Math.random()*512,1+Math.random()*2,1+Math.random()*2);
  }
  g.strokeStyle='rgba(80,60,140,0.08)';
  for(let r=20;r<260;r+=24){ g.beginPath(); g.arc(256,256,r,0,Math.PI*2); g.lineWidth=0.5+Math.random(); g.stroke(); }
  g.strokeStyle='rgba(60,50,110,0.12)'; g.lineWidth=1;
  for(let i=0;i<512;i+=64){ g.beginPath(); g.moveTo(i,0); g.lineTo(i,512); g.stroke(); g.beginPath(); g.moveTo(0,i); g.lineTo(512,i); g.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,2); return t;
}
function makeCeilingTex(){
  const c=document.createElement('canvas'); c.width=c.height=512;
  const g=c.getContext('2d');
  g.fillStyle='#06051a'; g.fillRect(0,0,512,512);
  for(let i=0;i<150;i++){
    const x=Math.random()*512,y=Math.random()*512;
    g.fillStyle=`rgba(255,255,255,${0.3+Math.random()*0.5})`;
    g.beginPath(); g.arc(x,y,Math.random()*1.4+0.3,0,Math.PI*2); g.fill();
  }
  for(let i=0;i<10;i++){
    const x=Math.random()*512,y=Math.random()*512;
    const gr=g.createRadialGradient(x,y,0,x,y,8);
    gr.addColorStop(0,'rgba(255,255,255,0.9)');
    gr.addColorStop(0.5,'rgba(167,139,250,0.3)');
    gr.addColorStop(1,'rgba(167,139,250,0)');
    g.fillStyle=gr; g.fillRect(x-8,y-8,16,16);
  }
  return new THREE.CanvasTexture(c);
}
function makeWallTex(){
  const c=document.createElement('canvas'); c.width=512; c.height=256;
  const g=c.getContext('2d');
  const gr=g.createLinearGradient(0,0,0,256);
  gr.addColorStop(0,'#181530'); gr.addColorStop(0.5,'#1a1635'); gr.addColorStop(1,'#10101e');
  g.fillStyle=gr; g.fillRect(0,0,512,256);
  for(let i=0;i<60;i++){
    g.fillStyle=`rgba(${30+Math.random()*30},${20+Math.random()*30},${60+Math.random()*40},${Math.random()*0.15})`;
    g.fillRect(Math.random()*512,0,1+Math.random()*3,256);
  }
  g.strokeStyle='rgba(100,80,160,0.04)'; g.lineWidth=1;
  for(let i=-256;i<512;i+=32){ g.beginPath(); g.moveTo(i,0); g.lineTo(i+256,256); g.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
function makeStarsTex(){
  const c=document.createElement('canvas'); c.width=512; c.height=384;
  const g=c.getContext('2d');
  const gr=g.createLinearGradient(0,0,0,384);
  gr.addColorStop(0,'#0a0a25'); gr.addColorStop(0.4,'#15103a'); gr.addColorStop(1,'#080820');

  const parts=[
    {y:1.55,r:0.18,m:bodyMat},

    {y:1.10,r:0.30,m:bodyMat},

    {y:0.30,r:0.40,m:wispMat,sy:0.6},

  });
  const aura=new THREE.Mesh(new THREE.SphereGeometry(0.55,16,14),auraMat);
  aura.position.y=0.9; aura.scale.set(1.1,1.7,1.1);
  aura.userData.aura=true;
  character.add(aura);
  // outer rim (backside additive glow → silhouette)
  const rimMat=new THREE.MeshBasicMaterial({color:0x9b8aff,transparent:true,opacity:0.12,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false});
  const rim=new THREE.Mesh(new THREE.SphereGeometry(0.62,18,14),rimMat);
  rim.position.y=0.9; rim.scale.set(1.2,1.95,1.2);
  rim.userData.rim=true;
  character.add(rim);
  // ground halo
  const haloMat=new THREE.MeshBasicMaterial({color:0x9b8aff,transparent:true,opacity:0.45,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
  const groundHalo=new THREE.Mesh(new THREE.RingGeometry(0.32,0.72,40),haloMat);
  groundHalo.rotation.x=-Math.PI/2;
  groundHalo.position.y=0.02;
  groundHalo.userData.groundHalo=true;
  character.add(groundHalo);
  // particle wisps
  const count=100;
  const geom=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  const data=[];
  for(let i=0;i<count;i++) resetParticle(pos,i,data,true);
  geom.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pTexC=document.createElement('canvas'); pTexC.width=pTexC.height=32;
  const pg=pTexC.getContext('2d');
  const pgrad=pg.createRadialGradient(16,16,0,16,16,16);
  pgrad.addColorStop(0,'rgba(40,30,80,0.9)');
  pgrad.addColorStop(0.4,'rgba(20,15,40,0.5)');
  pgrad.addColorStop(1,'rgba(0,0,0,0)');
  pg.fillStyle=pgrad; pg.fillRect(0,0,32,32);
  const pTex=new THREE.CanvasTexture(pTexC);
  characterParticles=new THREE.Points(geom,
    new THREE.PointsMaterial({size:0.18,map:pTex,transparent:true,opacity:0.55,depthWrite:false,color:0x080612}));

  character.add(innerGlow);

  character.position.set(0,0,3.5);
  scene.add(character);
}
function resetParticle(pos,i,data,init){
  const r=0.05+Math.random()*0.42, theta=Math.random()*Math.PI*2;
  const y=init?Math.random()*1.7:0.1+Math.random()*0.4;
  pos[i*3]=Math.cos(theta)*r; pos[i*3+1]=y; pos[i*3+2]=Math.sin(theta)*r;
  data[i]={vy:0.002+Math.random()*0.008,vth:(Math.random()-0.5)*0.04,
    vr:(Math.random()-0.5)*0.012,theta,r,age:Math.random()};
}
function updateCharacter(dt){
  const t=clock.elapsedTime;
  character.children.forEach(c=>{
    if(c.userData.baseY!=null){
      c.position.y=c.userData.baseY+Math.sin(t*1.2+c.userData.phase)*0.018;
    }
    if(c.userData.aura){
      const s=1+Math.sin(t*0.8)*0.04;
      c.scale.set(1.1*s,1.7*s,1.1*s);
    }
    if(c.userData.rim){
      const s=1+Math.sin(t*0.6)*0.04;
      c.scale.set(1.2*s,1.95*s,1.2*s);
      c.material.opacity=0.10+Math.sin(t*1.3)*0.04;
    }
    if(c.userData.groundHalo){
      c.scale.setScalar(1+Math.sin(t*1.0)*0.07);
      c.material.opacity=0.40+Math.sin(t*1.4)*0.10;
    }
  });
  if(character.userData.innerGlow){
    character.userData.innerGlow.intensity=0.9+Math.sin(t*1.2)*0.25;
  }
  const pos=characterParticles.geometry.attributes.position.array;
  const {data,count}=characterParticles.userData;
  for(let i=0;i<count;i++){
    const d=data[i];
    d.theta+=d.vth; d.age+=dt*0.3;
    pos[i*3+1]+=d.vy;
    const newR=d.r+d.vr*dt;
    pos[i*3]=Math.cos(d.theta)*newR;
    pos[i*3+2]=Math.sin(d.theta)*newR;
    if(pos[i*3+1]>1.9||d.age>4) resetParticle(pos,i,data,false);
  }
  characterParticles.geometry.attributes.position.needsUpdate=true;
}

function makeStatsCanvasTex(){
  const c=document.createElement('canvas'); c.width=460; c.height=320;
  const tex=new THREE.CanvasTexture(c);
  tex.userData={canvas:c};
  drawStatsCanvas(c);
  return tex;
}
function drawStatsCanvas(c){
  const g=c.getContext('2d'), W=c.width, H=c.height;
  const grad=g.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0c0a1f'); grad.addColorStop(1,'#16102a');
  g.fillStyle=grad; g.fillRect(0,0,W,H);
  g.fillStyle='#fbbf24';
  g.font='italic 22px Fraunces, Georgia, serif';
  g.fillText('İstatistik',20,38);
  g.fillStyle='rgba(155,150,194,0.7)';
  g.font='11px Manrope, sans-serif';
  g.fillText('SON 14 GÜN',20,56);
  const days14=[];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    days14.push({ts:d.getTime(),count:0,lucid:0});
  }
  state.dreams.forEach(dr=>{
    const dd=new Date(dr.date); dd.setHours(0,0,0,0);
    const slot=days14.find(s=>s.ts===dd.getTime());
    if(slot){ slot.count++; if((dr.lucidity||0)>=3) slot.lucid++; }
  });
  const maxC=Math.max(1,...days14.map(d=>d.count));
  const x0=30,y0=220,bW=(W-60)/14-4;
  days14.forEach((d,i)=>{
    const h=(d.count/maxC)*130, x=x0+i*(bW+4);
    const isL=d.lucid>0;
    const col=isL?'#fbbf24':'#a78bfa';
    g.fillStyle=col; g.shadowColor=col; g.shadowBlur=isL?14:8;
    g.fillRect(x,y0-h,bW,h);
    g.shadowBlur=0;
  });
  const total=state.dreams.length;
  const lucid=state.dreams.filter(d=>(d.lucidity||0)>=3).length;
  const pct=total?Math.round((lucid/total)*100):0;
  const dayKeys=new Set(state.dreams.map(d=>new Date(d.date).toDateString()));
  let streak=0, cursor=new Date();
  while(dayKeys.has(cursor.toDateString())){ streak++; cursor.setDate(cursor.getDate()-1); }
  const writeStat=(num,label,x,col)=>{
    g.fillStyle=col; g.font='italic 32px Fraunces, Georgia, serif';
    g.fillText(num,x,290);
    g.fillStyle='rgba(155,150,194,0.7)'; g.font='10px Manrope, sans-serif';
    g.fillText(label,x,305);
  };
  writeStat(total,'TOPLAM',30,'#a78bfa');
  writeStat(lucid,'LÜSİD',130,'#fbbf24');
  writeStat('%'+pct,'ORAN',220,'#67e8f9');
  writeStat(streak,'SERİ',340,'#6ee7b7');
  g.strokeStyle='rgba(167,139,250,0.2)'; g.lineWidth=1;
  g.strokeRect(15,15,W-30,H-30);
}
function refreshStatsCanvas(){
  interactives.forEach(it=>{
    if(it.key==='stats'&&it.group.userData.canvasTex){
      drawStatsCanvas(it.group.userData.canvasTex.userData.canvas);
      it.group.userData.canvasTex.needsUpdate=true;
    }
  });
}

function buildDust(){
  const count=80;
  const geom=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    pos[i*3]=(Math.random()-0.5)*(ROOM_SIZE-1);
    pos[i*3+1]=Math.random()*WALL_HEIGHT;
    pos[i*3+2]=(Math.random()-0.5)*(ROOM_SIZE-1);
  }
  geom.setAttribute('position',new THREE.BufferAttribute(pos,3));
  dustParticles=new THREE.Points(geom,
    new THREE.PointsMaterial({size:0.04,color:0xa78bfa,transparent:true,opacity:0.4,
      blending:THREE.AdditiveBlending,depthWrite:false}));
  dustParticles.userData.basePositions=Array.from(pos);
  scene.add(dustParticles);
}
function updateDust(){
  const t=clock.elapsedTime;
  const pos=dustParticles.geometry.attributes.position.array;
  const base=dustParticles.userData.basePositions;
  for(let i=0;i<pos.length/3;i++){
    pos[i*3]=base[i*3]+Math.sin(t*0.3+i)*0.15;
    pos[i*3+1]=base[i*3+1]+Math.sin(t*0.4+i*0.5)*0.2+(t*0.05)%WALL_HEIGHT-WALL_HEIGHT/2;
    pos[i*3+2]=base[i*3+2]+Math.cos(t*0.3+i)*0.15;
    if(pos[i*3+1]>WALL_HEIGHT) pos[i*3+1]-=WALL_HEIGHT;
    if(pos[i*3+1]<0) pos[i*3+1]+=WALL_HEIGHT;
  }
  dustParticles.geometry.attributes.position.needsUpdate=true;
}
