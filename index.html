function paletteFromId(id){
  const themes=[
    {primary:0xfbbf24,floor:0x2a1f0a,wall:0x3a2810,bg:'#2a1f0a'},
    {primary:0xa78bfa,floor:0x1a1530,wall:0x251a3a,bg:'#1a1530'},
    {primary:0x67e8f9,floor:0x0a1f25,wall:0x102530,bg:'#0a1f25'},
    {primary:0x6ee7b7,floor:0x0a2a1f,wall:0x102f25,bg:'#0a2a1f'},
    {primary:0xfb7185,floor:0x2a0a1f,wall:0x301025,bg:'#2a0a1f'},
    {primary:0x818cf8,floor:0x101030,wall:0x181840,bg:'#101030'}
  ];
  let h=0;
  for(let i=0;i<id.length;i++) h=(h<<5)-h+id.charCodeAt(i);
  return themes[Math.abs(h)%themes.length];
}

function makePalaceFloorTex(theme){
  const c=document.createElement('canvas'); c.width=c.height=512;
  const g=c.getContext('2d');
  g.fillStyle=theme.bg; g.fillRect(0,0,512,512);
  for(let i=0;i<2000;i++){
    g.fillStyle=`rgba(255,255,255,${Math.random()*0.05})`;
    g.fillRect(Math.random()*512,Math.random()*512,1+Math.random()*2,1+Math.random()*2);
  }
  const hex='#'+theme.primary.toString(16).padStart(6,'0');
  g.strokeStyle=hex+'22'; g.lineWidth=1;
  for(let r=20;r<260;r+=28){
    g.beginPath(); g.arc(256,256,r,0,Math.PI*2); g.stroke();
  }
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6;
    g.beginPath();
    g.moveTo(256+Math.cos(a)*20,256+Math.sin(a)*20);
    g.lineTo(256+Math.cos(a)*250,256+Math.sin(a)*250);
    g.stroke();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,2);
  return t;
}

function makePalaceBannerTex(name,theme){
  const c=document.createElement('canvas'); c.width=1024; c.height=256;
  const g=c.getContext('2d');
  g.clearRect(0,0,1024,256);
  let fs=80;
  g.font=`italic ${fs}px Fraunces, Georgia, serif`;
  while(g.measureText(name||'').width>900 && fs>30){
    fs-=4;
    g.font=`italic ${fs}px Fraunces, Georgia, serif`;
  }
  const hex='#'+theme.primary.toString(16).padStart(6,'0');
  g.shadowColor=hex; g.shadowBlur=30;
  g.fillStyle='#fff';
  g.textAlign='center'; g.textBaseline='middle';
  g.fillText(name||'İsimsiz Saray',512,128);
  g.shadowBlur=0;
  return new THREE.CanvasTexture(c);
}

function buildSpotOrb(spot,theme,x,y,z){
  const g=new THREE.Group();
  const orb=new THREE.Mesh(
    new THREE.SphereGeometry(0.22,24,24),
    new THREE.MeshStandardMaterial({color:theme.primary,emissive:theme.primary,emissiveIntensity:0.7,roughness:0.3})
  );
  orb.userData.float=true; orb.userData.baseY=0;
  g.add(orb);
  const halo=new THREE.Mesh(
    new THREE.RingGeometry(0.32,0.36,32),
    new THREE.MeshBasicMaterial({color:theme.primary,transparent:true,opacity:0.55,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  halo.rotation.x=Math.PI/2; halo.userData.halo=true;
  g.add(halo);
  // Ground beam below orb
  const beam=new THREE.Mesh(
    new THREE.CylinderGeometry(0.05,0.18,y,12,1,true),
    new THREE.MeshBasicMaterial({color:theme.primary,transparent:true,opacity:0.15,depthWrite:false,blending:THREE.AdditiveBlending})
  );
  beam.position.y=-y/2;
  g.add(beam);
  g.position.set(x,y,z);
  const light=new THREE.PointLight(theme.primary,0.5,2.5,1.5);
  light.position.set(x,y,z);
  const label=document.createElement('div');
  label.className='label-3d';
  label.innerHTML=`<em>${escapeHtml(spot.location)}</em><span class="label-3d-key">E</span>`;
  document.body.appendChild(label);
  return {group:g,light,label};
}

function buildPalaceRoom(palace){
  const theme=paletteFromId(palace.id);
  palaceRoomGroup=new THREE.Group();
  scene.add(palaceRoomGroup);
  const half=ROOM_SIZE/2;

  // Floor
  const floor=new THREE.Mesh(
    new THREE.PlaneGeometry(ROOM_SIZE,ROOM_SIZE),
    new THREE.MeshStandardMaterial({map:makePalaceFloorTex(theme),color:theme.floor,roughness:0.85,metalness:0.2})
  );
  floor.rotation.x=-Math.PI/2;
  palaceRoomGroup.add(floor);

  // Ceiling
  const ceiling=new THREE.Mesh(
    new THREE.PlaneGeometry(ROOM_SIZE,ROOM_SIZE),
    new THREE.MeshStandardMaterial({color:theme.floor,roughness:0.95})
  );
  ceiling.rotation.x=Math.PI/2; ceiling.position.y=WALL_HEIGHT;
  palaceRoomGroup.add(ceiling);

  // Walls
  const wallMat=new THREE.MeshStandardMaterial({color:theme.wall,roughness:0.9,metalness:0.15});
  [['n',0,WALL_HEIGHT/2,-half,0],
   ['s',0,WALL_HEIGHT/2,half,Math.PI],
   ['e',half,WALL_HEIGHT/2,0,-Math.PI/2],
   ['w',-half,WALL_HEIGHT/2,0,Math.PI/2]].forEach(([_,x,y,z,ry])=>{
    const wall=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE,WALL_HEIGHT),wallMat.clone());
    wall.position.set(x,y,z); wall.rotation.y=ry;
    palaceRoomGroup.add(wall);
  });

  // Center light + ambient theme glow
  const centerLight=new THREE.PointLight(theme.primary,1.2,12,1.4);
  centerLight.position.set(0,WALL_HEIGHT-0.5,0);
  palaceRoomGroup.add(centerLight);
  const themeAmbient=new THREE.PointLight(theme.primary,0.4,18,2);
  themeAmbient.position.set(0,WALL_HEIGHT/2,0);
  palaceRoomGroup.add(themeAmbient);

  // Palace name banner on north wall
  const banner=new THREE.Mesh(
    new THREE.PlaneGeometry(5.5,1.4),
    new THREE.MeshBasicMaterial({map:makePalaceBannerTex(palace.name,theme),transparent:true})
  );
  banner.position.set(0,3.3,-half+0.05);
  palaceRoomGroup.add(banner);
  // Banner frame
  const frameMat=new THREE.MeshStandardMaterial({color:theme.primary,emissive:theme.primary,emissiveIntensity:0.4,metalness:0.5,roughness:0.4});
  const frameTop=new THREE.Mesh(new THREE.BoxGeometry(5.8,0.06,0.06),frameMat);
  frameTop.position.set(0,4.05,-half+0.07); palaceRoomGroup.add(frameTop);
  const frameBot=frameTop.clone(); frameBot.position.y=2.55; palaceRoomGroup.add(frameBot);

  // Exit portal on south wall
  const portalG=new THREE.Group();
  const portalMat=new THREE.MeshStandardMaterial({color:0xa78bfa,emissive:0x4a3a8a,emissiveIntensity:0.9,roughness:0.3,metalness:0.5});
  const arch=new THREE.Mesh(new THREE.TorusGeometry(1.0,0.09,12,32,Math.PI),portalMat);
  arch.position.set(0,1.5,0);
  portalG.add(arch);
  const sideL=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.5,0.12),portalMat);
  sideL.position.set(-1.0,0.75,0); portalG.add(sideL);
  const sideR=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.5,0.12),portalMat);
  sideR.position.set(1.0,0.75,0); portalG.add(sideR);
  const portalGlow=new THREE.Mesh(
    new THREE.PlaneGeometry(1.85,2.4),
    new THREE.MeshBasicMaterial({color:0x9b8aff,transparent:true,opacity:0.35,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  portalGlow.position.set(0,1.0,0); portalGlow.userData.halo=true;
  portalG.add(portalGlow);
  portalG.position.set(0,0,half-0.6);
  palaceRoomGroup.add(portalG);
  const portalLight=new THREE.PointLight(0xa78bfa,1.4,5,1.5);
  portalLight.position.set(0,1.6,half-1.4);
  palaceRoomGroup.add(portalLight);

  const exitLabel=document.createElement('div');
  exitLabel.className='label-3d';
  exitLabel.innerHTML=`<em>Çıkış</em><span class="label-3d-key">E</span>`;
  document.body.appendChild(exitLabel);

  palaceInteractives=[{
    group:portalG,name:'Çıkış',color:0xa78bfa,light:portalLight,
    key:'exit-palace',label:exitLabel
  }];

  // Collect all spots from all rooms
  const allSpots=[];
  (palace.rooms||[]).forEach(room=>{
    (room.spots||[]).forEach(s=>allSpots.push({...s,roomName:room.name}));
  });

  // Arrange spots in a circle around center
  if(allSpots.length>0){
    const radius=allSpots.length<=4?3:Math.min(4.5,2.5+allSpots.length*0.15);
    allSpots.forEach((spot,i)=>{
      const angle=(i/allSpots.length)*Math.PI*2-Math.PI/2;
      const x=Math.cos(angle)*radius;
      const z=Math.sin(angle)*radius;
      const y=1.4;
      const orbB=buildSpotOrb(spot,theme,x,y,z);
      palaceRoomGroup.add(orbB.group);
      palaceRoomGroup.add(orbB.light);
      palaceInteractives.push({
        group:orbB.group,name:spot.location,color:theme.primary,light:orbB.light,
        key:'spot-'+i,spot:spot,label:orbB.label
      });
    });
  }
}

function disposePalaceRoom(){
  if(!palaceRoomGroup) return;
  scene.remove(palaceRoomGroup);
  palaceRoomGroup.traverse(obj=>{
    if(obj.geometry) obj.geometry.dispose();
    if(obj.material){
      const mats=Array.isArray(obj.material)?obj.material:[obj.material];
      mats.forEach(m=>{ if(m.map) m.map.dispose(); m.dispose(); });
    }
  });
  palaceInteractives.forEach(it=>it.label&&it.label.remove());
  palaceInteractives=[];
  palaceRoomGroup=null;
}

function enterPalace(palaceId){
  const palace=state.palaces.find(p=>p.id===palaceId);
  if(!palace) return;
  if(panelOpen) closePanel();
  homeInteractives.forEach(it=>it.label&&it.label.classList.remove('show'));
  // Reset key state so any held WASD doesn't keep moving char in background
  for(const k in keys) keys[k]=false;
  joystickInputX=0; joystickInputY=0; joystickActive=false;
  isBackRotating=false;
  showPhotoRoom(palace);
  currentScene='palace';
  currentPalace=palace;
}

function showPhotoRoom(palace){
  let ov=document.getElementById('photoRoomOverlay');
  if(ov) ov.remove();
  ov=document.createElement('div');
  ov.id='photoRoomOverlay';
  ov.innerHTML=
    '<img src="'+OZ_ROOM_IMG+'" alt="" class="photo-room-img"/>'+
    '<button class="photo-room-exit" onclick="exitPalace()">← Geri dön</button>'+
    '<div class="photo-room-name">'+escapeHtml(palace.name||'')+'</div>';
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
}

function hidePhotoRoom(){
  const ov=document.getElementById('photoRoomOverlay');
  if(!ov) return;
  ov.classList.remove('show');
  setTimeout(()=>ov.remove(),420);
}

function exitPalace(){
  hidePhotoRoom();
  currentScene='home';
  currentPalace=null;
}

function flashTransition(){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;z-index:9000;pointer-events:none;background:radial-gradient(circle,rgba(255,255,255,0.7),rgba(167,139,250,0.4));opacity:0;transition:opacity 220ms ease-out';
  document.body.appendChild(el);
  requestAnimationFrame(()=>{
    el.style.opacity='1';
    setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),260); },180);
  });
}

function showSpotDetail(spot){
  showModal({
    title:spot.location,
    body:`
      <div style="display:inline-block;font-size:11px;color:var(--cyan);background:rgba(103,232,249,0.1);border:1px solid rgba(103,232,249,0.25);padding:4px 12px;border-radius:10px;margin-bottom:14px;letter-spacing:0.04em">${escapeHtml(spot.roomName||'')}</div>
      <div class="detail-content">${escapeHtml(spot.memory)}</div>`,
    foot:`<button class="btn btn-ghost" onclick="closeModal()">Kapat</button>`
  });
}

// ===== INPUT =====
function onKeyDown(e){
  const k=e.key.toLowerCase();
  if(panelOpen){
    if(k==='escape') closePanel();
    return;
  }
  if(currentScene==='palace'){
    if(k==='escape') exitPalace();
    return;
  }
  keys[k]=true;
  if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(k==='e'){
    const it=nearestInteractive(2.4);
    if(it){
      if(it.key==='exit-palace') exitPalace();
      else if(it.key.startsWith('spot-')) showSpotDetail(it.spot);
      else openSection(it.key);
    }
  }
  if(k===' '&&isGrounded){
    velocityY=JUMP_VEL;
    isGrounded=false;
  }
}
function onKeyUp(e){ keys[e.key.toLowerCase()]=false; }

function onCanvasClick(e){
  if(panelOpen) return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=[];
  interactives.forEach(it=>it.group.traverse(o=>{ if(o.isMesh) hits.push({mesh:o,it}); }));
  const meshes=hits.map(h=>h.mesh);
  const ints=raycaster.intersectObjects(meshes,false);
  if(ints.length>0){
    const found=hits.find(h=>h.mesh===ints[0].object);
    if(found){
      const dist=found.it.group.position.distanceTo(character.position);
      if(dist<5.5){
        if(found.it.key==='exit-palace') exitPalace();
        else if(found.it.key.startsWith('spot-')) showSpotDetail(found.it.spot);
        else openSection(found.it.key);
      }
      else toast('Yaklaş, sonra etkileş','error');
    }
  }
}

function onMouseDown(e){
  if(e.button!==0||panelOpen) return;
  isDragging=true;
  lastDragX=e.clientX; lastDragY=e.clientY;
  dragMoveDist=0;
}
function onMouseMove(e){
  if(!isDragging) return;
  const dx=e.clientX-lastDragX, dy=e.clientY-lastDragY;
  lastDragX=e.clientX; lastDragY=e.clientY;
  cameraYaw-=dx*0.005;
  cameraPitch=Math.max(0.1,Math.min(1.3,cameraPitch-dy*0.005));
  dragMoveDist+=Math.hypot(dx,dy);
}
function onMouseUp(e){
  if(!isDragging) return;
  isDragging=false;
  if(dragMoveDist<5) onCanvasClick(e);
}
function onTouchStart(e){
  if(panelOpen) return;
  // İki parmak → pinch zoom (mevcut joystick olmadan dokunulan parmaklar)
  if(e.touches.length>=2 && !pinchActive){
    const nonJoy=[];
    for(let i=0;i<e.touches.length;i++){
      if(e.touches[i].identifier!==joystickTouchId) nonJoy.push(e.touches[i]);
    }
    if(nonJoy.length>=2){
      e.preventDefault();
      pinchActive=true;
      pinchTouchId1=nonJoy[0].identifier;
      pinchTouchId2=nonJoy[1].identifier;
      const t1=nonJoy[0], t2=nonJoy[1];
      pinchInitialDist=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
      pinchInitialCamDist=cameraDistance;
      if(lookTouchId===pinchTouchId1 || lookTouchId===pinchTouchId2) lookTouchId=null;
      return;
    }
  }
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const x=t.clientX, y=t.clientY;
    // Sol yarı = joystick (eğer aktif değilse)
    if(x<window.innerWidth/2 && joystickTouchId===null){
      e.preventDefault();
      joystickTouchId=t.identifier;
      joystickActive=true;
      joystickCenterX=x; joystickCenterY=y;
      joystickStartX=x; joystickStartY=y;
      joystickMoved=false;
      joystickInputX=0; joystickInputY=0;
      const el=document.getElementById('joystickContainer');
      el.style.left=x+'px';
      el.style.top=y+'px';
      el.classList.add('active');
      const knob=document.querySelector('.joystick-knob');
      if(knob) knob.style.transform='';
    }
    // Sağ yarı = kamera bakış (eğer aktif değilse)
    else if(x>=window.innerWidth/2 && lookTouchId===null){
      e.preventDefault();
      lookTouchId=t.identifier;
      lookLastX=x; lookLastY=y;
      lookMoveDist=0;
    }
  }
}
function onTouchMove(e){
  if(panelOpen) return;
  if(pinchActive){
    e.preventDefault();
    let t1=null,t2=null;
    for(let i=0;i<e.touches.length;i++){
      if(e.touches[i].identifier===pinchTouchId1) t1=e.touches[i];
      else if(e.touches[i].identifier===pinchTouchId2) t2=e.touches[i];
    }
    if(t1 && t2){
      const cur=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
      const ratio=cur/pinchInitialDist;
      cameraDistance=Math.max(MIN_CAM_DIST,Math.min(MAX_CAM_DIST,pinchInitialCamDist/ratio));
    }
    return;
  }
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(t.identifier===joystickTouchId){
      e.preventDefault();
      const dx=t.clientX-joystickCenterX;
      const dy=t.clientY-joystickCenterY;
      const dist=Math.hypot(dx,dy);
      const maxR=50;
      const cx=dist>maxR?maxR*dx/dist:dx;
      const cy=dist>maxR?maxR*dy/dist:dy;
      const knob=document.querySelector('.joystick-knob');
      if(knob) knob.style.transform=`translate(${cx}px,${cy}px)`;
      joystickInputX=cx/maxR;
      joystickInputY=cy/maxR;
      if(dist>6) joystickMoved=true;
    } else if(t.identifier===lookTouchId){
      e.preventDefault();
      const dx=t.clientX-lookLastX;
      const dy=t.clientY-lookLastY;
      lookLastX=t.clientX; lookLastY=t.clientY;
      cameraYaw-=dx*0.005;
      cameraPitch=Math.max(0.1,Math.min(1.3,cameraPitch-dy*0.005));
      lookMoveDist+=Math.hypot(dx,dy);
    }
  }
}
function onTouchEnd(e){
  if(pinchActive){
    for(let i=0;i<e.changedTouches.length;i++){
      const id=e.changedTouches[i].identifier;
      if(id===pinchTouchId1 || id===pinchTouchId2){
        pinchActive=false;
        pinchTouchId1=null; pinchTouchId2=null;
        break;
      }
    }
  }
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(t.identifier===joystickTouchId){
      // Hareket etmeden bırakıldıysa = tıklama olarak işle
      if(!joystickMoved && !panelOpen){
        onCanvasClick({clientX:joystickStartX,clientY:joystickStartY});
      }
      joystickTouchId=null;
      joystickActive=false;
      joystickInputX=0; joystickInputY=0;
      const el=document.getElementById('joystickContainer');
      if(el) el.classList.remove('active');
    } else if(t.identifier===lookTouchId){
      if(lookMoveDist<8 && !panelOpen){
        onCanvasClick({clientX:t.clientX,clientY:t.clientY});
      }
      lookTouchId=null;
    }
  }
}

function nearestInteractive(maxDist){
  let nearest=null, best=maxDist;
  interactives.forEach(it=>{
    const d=it.group.position.distanceTo(character.position);
    if(d<best){ best=d; nearest=it; }
  });
  return nearest;
}

function setupMobileControls(){
  const jumpBtn=document.getElementById('mobileJumpBtn');
  if(!jumpBtn) return;
  const doJump=()=>{
    if(isGrounded&&!panelOpen){
      velocityY=JUMP_VEL;
      isGrounded=false;
    }
  };
  jumpBtn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();doJump();},{passive:false});
  jumpBtn.addEventListener('mousedown',e=>{e.stopPropagation();doJump();});
}

// ===== MOVEMENT =====
function updateMovement(dt){
  if(panelOpen){
    velocityY+=GRAVITY*dt;
    character.position.y+=velocityY*dt;
    if(character.position.y<=0){ character.position.y=0; velocityY=0; isGrounded=true; }
    charVelX*=0.85; charVelZ*=0.85;
    return;
  }
  let dx=0,dz=0;
  if(joystickActive){
    dx=joystickInputX;
    dz=joystickInputY;
  } else {
    if(keys['w']||keys['arrowup']) dz-=1;
    if(keys['s']||keys['arrowdown']) dz+=1;
    if(keys['a']||keys['arrowleft']) dx-=1;
    if(keys['d']||keys['arrowright']) dx+=1;
    const len=Math.hypot(dx,dz);
    if(len>1){ dx/=len; dz/=len; }
  }
  // Kamera otomatik dönüş: ileri-yan hareket → kamera o yöne döner (oyun-vari)
  const isLooking=(lookTouchId!==null)||isDragging;
  if(!isLooking && !isBackRotating && dz<-0.15 && Math.abs(dx)>0.05){
    cameraYaw-=dx*1.1*dt;
  }
  // Geri tuşunda kamera 180° döner; karakter dünya yönünde sabit kalır (ileri yürüyor gibi görünür)
  if(!isLooking && !isBackRotating && dz>0.2){
    isBackRotating=true;
    const cy0=Math.cos(cameraYaw), sy0=Math.sin(cameraYaw);
    backWorldX=dx*cy0+dz*sy0;
    backWorldZ=-dx*sy0+dz*cy0;
    backRotateTarget=cameraYaw+Math.PI;
  }
  if(isBackRotating){
    if(dz<0.1 || isLooking){
      isBackRotating=false;
    } else {
      let delta=backRotateTarget-cameraYaw;
      while(delta>Math.PI) delta-=2*Math.PI;
      while(delta<-Math.PI) delta+=2*Math.PI;
      if(Math.abs(delta)>0.04){
        cameraYaw+=Math.sign(delta)*Math.min(Math.abs(delta), 3.5*dt);
      }
      const cyn=Math.cos(cameraYaw), syn=Math.sin(cameraYaw);
      dx=backWorldX*cyn-backWorldZ*syn;
      dz=backWorldX*syn+backWorldZ*cyn;
    }
  }
  const inputMag=Math.hypot(dx,dz);
  if(inputMag>0.04){
    const cy=Math.cos(cameraYaw), sy=Math.sin(cameraYaw);
    const wx=dx*cy+dz*sy;
    const wz=-dx*sy+dz*cy;
    const speed=4.5;
    let nx=character.position.x+wx*speed*dt;
    let nz=character.position.z+wz*speed*dt;
    nx=Math.max(-PLAYER_BOUND,Math.min(PLAYER_BOUND,nx));
    nz=Math.max(-PLAYER_BOUND,Math.min(PLAYER_BOUND,nz));
    if(currentScene==='home'){
      const luciDist=Math.hypot(nx,nz+3);
      if(luciDist<0.95){
        const ang=Math.atan2(nz+3,nx);
        nx=Math.cos(ang)*0.95;
        nz=-3+Math.sin(ang)*0.95;
      }
    }
    character.position.x=nx;
    character.position.z=nz;
    // Smoothed world velocity for auto-camera
    charVelX+=(wx-charVelX)*0.18;
    charVelZ+=(wz-charVelZ)*0.18;
  } else {
    charVelX*=0.85;
    charVelZ*=0.85;
  }
  velocityY+=GRAVITY*dt;
  character.position.y+=velocityY*dt;
  if(character.position.y<=0){
    character.position.y=0;
    velocityY=0;
    isGrounded=true;
  }
}

// ===== CAMERA =====
function updateCamera(){
  const cx=character.position.x;
  const cy=character.position.y;
  const cz=character.position.z;
  const horiz=cameraDistance*Math.cos(cameraPitch);
  const vert=cameraDistance*Math.sin(cameraPitch);
  const tx=cx+Math.sin(cameraYaw)*horiz;
  const tz=cz+Math.cos(cameraYaw)*horiz;
  const ty=cy+1.1+vert;
  camera.position.x+=(tx-camera.position.x)*0.12;
  camera.position.y+=(ty-camera.position.y)*0.10;
  camera.position.z+=(tz-camera.position.z)*0.12;
  camera.lookAt(cx,cy+1.0,cz);
}

// ===== INTERACTIVE ANIM =====
function updateInteractives(dt){
  const t=clock.elapsedTime;
  interactives.forEach(it=>{
    it.group.traverse(o=>{
      if(o.userData&&o.userData.float)
        o.position.y=(o.userData.baseY||0)+Math.sin(t*1.0+o.id*0.1)*0.05;
      if(o.userData&&o.userData.spin) o.rotation.y+=dt*o.userData.spin;
      if(o.userData&&o.userData.halo) o.rotation.z=t*0.4;
    });
    const dist=it.group.position.distanceTo(character.position);
    const close=Math.max(0,Math.min(1,(5.5-dist)/4));
    it.light.intensity=0.5+close*1.6;
    if(dist<4.2){
      it.label.classList.add('show');
      const lp=it.group.position.clone();
      lp.y+=it.key==='stats'?1.4:(it.key==='luci'?1.7:0.95);
      const proj=lp.clone().project(camera);
      it.label.style.left=((proj.x*0.5+0.5)*window.innerWidth)+'px';
      it.label.style.top=((-proj.y*0.5+0.5)*window.innerHeight)+'px';
    } else {
      it.label.classList.remove('show');
    }
  });
}

// ===== ANIMATION LOOP =====
let _statsTimer=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(0.05,clock.getDelta());
  updateMovement(dt);
  updateCharacter(dt);
  updateInteractives(dt);
  updateDust();
  updateCamera();
  _statsTimer+=dt;
  if(_statsTimer>1.8){ _statsTimer=0; refreshStatsCanvas(); }
  renderer.render(scene,camera);
}

function onWheel(e){
  if(panelOpen) return;
  e.preventDefault();
  cameraDistance=Math.max(MIN_CAM_DIST,Math.min(MAX_CAM_DIST,cameraDistance+e.deltaY*0.008));
}

function setupChipInput(target,initial){
  const wrap=document.querySelector(`.chip-input-wrap[data-chip-target="${target}"]`);
  if(!wrap) return;
  wrap._chips=[...initial];
  const input=wrap.querySelector('.chip-input');
  function render(){
    wrap.querySelectorAll('.chip').forEach(c=>c.remove());
    wrap._chips.forEach((c,i)=>{
      const sp=document.createElement('span');
      sp.className='chip '+(target==='signs'?'cyan':'');
      sp.innerHTML=`${escapeHtml(c)}<span class="chip-x" data-i="${i}">×</span>`;
      wrap.insertBefore(sp,input);
    });
    wrap.querySelectorAll('.chip-x').forEach(x=>x.addEventListener('click',e=>{
      e.stopPropagation();
      wrap._chips.splice(+x.dataset.i,1);
      render();
    }));
  }
  function add(){
    const v=input.value.trim().toLowerCase();
    if(!v) return;
    if(!wrap._chips.includes(v)) wrap._chips.push(v);
    input.value=''; render();
  }
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===','){ e.preventDefault(); add(); }
    else if(e.key==='Backspace'&&!input.value&&wrap._chips.length){ wrap._chips.pop(); render(); }
  });
  input.addEventListener('blur',add);
  render();
}

function getChipValues(target){
  const wrap=document.querySelector(`.chip-input-wrap[data-chip-target="${target}"]`);
  return wrap?wrap._chips||[]:[];
}

function savePalace(editId){
  const fd=new FormData(document.getElementById('palaceForm'));
  const name=(fd.get('name')||'').trim();
  if(!name){ toast('İsim gerekli','error'); return; }
  if(editId){
    const p=state.palaces.find(x=>x.id===editId);
    p.name=name; p.description=fd.get('description')||'';
  } else {
    state.palaces.push({id:uid(),name,description:fd.get('description')||'',rooms:[],createdAt:Date.now()});
  }
  saveState(); closeModal(); renderLuciPanel(document.getElementById('panelBody'));
  toast(editId?'Güncellendi':'Saray kuruldu','success');
}

function deletePalace(id){
  showConfirm('Bu sarayı sil?','İçindeki tüm odalar ve noktalar silinecek.',()=>{
    state.palaces=state.palaces.filter(p=>p.id!==id);
    saveState(); closeModal(); renderLuciPanel(document.getElementById('panelBody')); toast('Saray silindi');
  });
}

// ===== PRACTICE =====
function startPractice(palaceId,roomId){
  const p=state.palaces.find(x=>x.id===palaceId); if(!p) return;
  let spots=[];
  if(roomId){
    const r=(p.rooms||[]).find(x=>x.id===roomId);
    spots=(r.spots||[]).map(s=>({...s,roomName:r.name}));
  } else {
    (p.rooms||[]).forEach(r=>(r.spots||[]).forEach(s=>spots.push({...s,roomName:r.name})));
  }
  if(spots.length<1){ toast('Önce noktalar ekle','error'); return; }
  practiceState={palaceName:p.name,spots,index:0,revealed:false,results:spots.map(()=>null)};
  renderLuciPanel(document.getElementById('panelBody'));
}

function renderPractice(root){
  const ps=practiceState;
  if(ps.index>=ps.spots.length){
    const correct=ps.results.filter(r=>r==='ok').length;
    const total=ps.spots.length;
    const pct=Math.round((correct/total)*100);
    root.innerHTML=`
      <div class="palace-detail-head">
        <button class="back-btn" onclick="exitPractice()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
        <div class="detail-title">Sonuç</div>
      </div>
      <div class="card card-elevated practice-summary">
        <div class="practice-score">${pct}%</div>
        <div class="practice-score-label">${correct} / ${total} hatırlandı</div>
        <p style="color:var(--text-muted);font-size:14px;line-height:1.6;max-width:300px;margin:0 auto 22px">${pct>=80?'Mükemmel — sarayın oturmuş.':pct>=50?'İyi gidiyor. Birkaç gün sonra tekrar.':'Önemli olan eksiklerini görmen.'}</p>
        <button class="btn btn-primary" onclick="restartPractice()">Tekrar pratik</button>
        <button class="btn btn-ghost" onclick="exitPractice()" style="margin-left:8px">Çık</button>
      </div>`;
    return;
  }
  const cur=ps.spots[ps.index];
  const pips=ps.spots.map((_,i)=>{
    let cls='';
    if(i<ps.index) cls=ps.results[i]==='ok'?'done':'skip';
    else if(i===ps.index) cls='now';
    return `<span class="progress-pip ${cls}"></span>`;
  }).join('');
  root.innerHTML=`
    <div class="palace-detail-head">
      <button class="back-btn" onclick="exitPractice()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      <div>
        <div style="font-size:11px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase">Pratik · ${escapeHtml(ps.palaceName)}</div>
        <div class="detail-title">Hatırla</div>
      </div>
    </div>
    <div class="practice-progress">${pips}</div>
    <div class="practice-stage">
      <div class="practice-step">${ps.index+1} / ${ps.spots.length}</div>
      <div class="practice-room-tag">${escapeHtml(cur.roomName)}</div>
      <div class="practice-location">${escapeHtml(cur.location)}</div>
      ${ps.revealed?`<div class="practice-memory">${escapeHtml(cur.memory)}</div>`:''}
    </div>
    <div class="practice-actions">
      ${!ps.revealed?
        `<button class="btn btn-primary btn-lg" onclick="revealPractice()">Cevabı göster</button>
         <button class="btn btn-ghost" onclick="skipPractice()">Atla</button>`:
        `<button class="btn" style="background:rgba(110,231,183,0.15);border-color:rgba(110,231,183,0.4);color:var(--emerald)" onclick="markPractice('ok')">✓ Hatırladım</button>
         <button class="btn" style="background:rgba(251,113,133,0.12);border-color:rgba(251,113,133,0.3);color:var(--rose)" onclick="markPractice('skip')">✗ Hatırlayamadım</button>`}
    </div>`;
}

function revealPractice(){ practiceState.revealed=true; renderLuciPanel(document.getElementById('panelBody')); }
function skipPractice(){ practiceState.results[practiceState.index]='skip'; practiceState.index++; practiceState.revealed=false; renderLuciPanel(document.getElementById('panelBody')); }
function markPractice(r){ practiceState.results[practiceState.index]=r; practiceState.index++; practiceState.revealed=false; renderLuciPanel(document.getElementById('panelBody')); }
function exitPractice(){ practiceState=null; renderLuciPanel(document.getElementById('panelBody')); }
function restartPractice(){ practiceState.index=0; practiceState.revealed=false; practiceState.results=practiceState.spots.map(()=>null); renderLuciPanel(document.getElementById('panelBody')); }

function toggleTech(idx){
  const card=document.querySelector(`.tech-card[data-idx="${idx}"]`);
  const open=card.dataset.open==='true';
  card.dataset.open=!open;
  card.querySelector('.tech-body').style.display=open?'none':'block';
}

function toggleRC(i){
  const arr=state.settings.activeRCs;
  const idx=arr.indexOf(i);
  if(idx>=0) arr.splice(idx,1); else arr.push(i);
  saveState();
  renderTechInner();
}

function showCurrentRC(){
  const active=state.settings.activeRCs.length?state.settings.activeRCs:[0];
  const i=active[Math.floor(Math.random()*active.length)];
  const rc=realityChecks[i];
  const box=document.getElementById('rcCurrentText');
  if(box) box.textContent=`${i+1}. ${rc.name}`;
  state.settings.rcLastShown=Date.now();
  saveState();
}

function startRCTimer(){
  stopRCTimer();
  rcTimer=setInterval(()=>{
    if(panelOpen&&currentSubtab==='rc') showCurrentRC();
    else if(state.settings.rcEnabled){
      const active=state.settings.activeRCs.length?state.settings.activeRCs:[0];
      const i=active[Math.floor(Math.random()*active.length)];
      toast('🌙 '+realityChecks[i].name,'success');
    }
  },state.settings.rcInterval*60*1000);
}
function stopRCTimer(){ if(rcTimer) clearInterval(rcTimer); rcTimer=null; }

function renderStatsPanel(root){
  const total=state.dreams.length;
  const lucid=state.dreams.filter(d=>(d.lucidity||0)>=3).length;
  const pct=total?Math.round((lucid/total)*100):0;
  const avgVivid=total?(state.dreams.reduce((s,d)=>s+(d.vividness||0),0)/total).toFixed(1):'—';
  // Streak
  const dayKeys=new Set(state.dreams.map(d=>new Date(d.date).toDateString()));
  let streak=0, cursor=new Date();
  while(dayKeys.has(cursor.toDateString())){ streak++; cursor.setDate(cursor.getDate()-1); }
  // Last 14 days
  const days14=[];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    days14.push({ts:d.getTime(),count:0,lucid:0,date:d});
  }
  state.dreams.forEach(dr=>{
    const dd=new Date(dr.date); dd.setHours(0,0,0,0);
    const slot=days14.find(s=>s.ts===dd.getTime());
    if(slot){ slot.count++; if((dr.lucidity||0)>=3) slot.lucid++; }
  });
  const maxC=Math.max(1,...days14.map(d=>d.count));
  // Top signs
  const signCounts={}; state.dreams.forEach(d=>(d.signs||[]).forEach(s=>signCounts[s]=(signCounts[s]||0)+1));
  const topSigns=Object.entries(signCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  // Top tags
  const tagCounts={}; state.dreams.forEach(d=>(d.tags||[]).forEach(t=>tagCounts[t]=(tagCounts[t]||0)+1));
  const topTags=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  // Luci stats
  const palaceCount=state.palaces.length;
  const totalRooms=state.palaces.reduce((s,p)=>s+(p.rooms||[]).length,0);
  const totalSpots=state.palaces.reduce((s,p)=>s+(p.rooms||[]).reduce((s2,r)=>s2+(r.spots||[]).length,0),0);

  // SVG bar chart for 14 days
  const W=480, H=110, pad=10;
  const barW=(W-pad*2)/14;
  let svgBars='';
  days14.forEach((d,i)=>{
    const h=(d.count/maxC)*(H-pad*2);
    const x=pad+i*barW+1;
    const y=H-pad-h;
    const isL=d.lucid>0;
    const fill=isL?'#fbbf24':'#a78bfa';
    svgBars+=`<rect x="${x}" y="${y}" width="${barW-2}" height="${h}" fill="${fill}" rx="2"/>`;
  });

  if(total===0&&palaceCount===0){
    root.innerHTML=`
      <div class="empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18M7 14l4-4 4 4 6-6"/></svg>
        <div class="empty-title">Henüz veri yok</div>
        <div class="empty-text">Birkaç rüya ekledikten sonra desenler burada belirir.</div>
      </div>`;
    return;
  }

  root.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value violet">${total}</div><div class="stat-label">Toplam Rüya</div></div>
      <div class="stat-card"><div class="stat-value gold">${lucid}</div><div class="stat-label">Lüsid Rüya</div><div class="stat-sub">${pct}% oran</div></div>
      <div class="stat-card"><div class="stat-value emerald">${streak}</div><div class="stat-label">Günlük Seri</div><div class="stat-sub">${streak>0?'Devam et 🌙':'Bugün başla'}</div></div>
      <div class="stat-card"><div class="stat-value cyan">${avgVivid}</div><div class="stat-label">Ort. Canlılık</div><div class="stat-sub">/10</div></div>
    </div>
    <div class="trend-chart">
      <div class="bar-chart-title">Son 14 gün · ${state.dreams.filter(d=>d.date>=Date.now()-14*86400000).length} kayıt</div>
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${svgBars}</svg>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text-faint)">
        <span>14 gün önce</span><span>bugün</span>
      </div>
    </div>
    ${topSigns.length?`
      <div class="bar-chart">
        <div class="bar-chart-title">En sık rüya işaretleri</div>
        ${topSigns.map(([s,c])=>{
          const w=(c/topSigns[0][1])*100;
          return `<div class="bar-row"><div class="bar-label">${escapeHtml(s)}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div><div class="bar-count">${c}</div></div>`;
        }).join('')}
      </div>`:''}
    ${topTags.length?`
      <div class="bar-chart">
        <div class="bar-chart-title">En sık etiketler</div>
        ${topTags.map(([s,c])=>{
          const w=(c/topTags[0][1])*100;
          return `<div class="bar-row"><div class="bar-label">${escapeHtml(s)}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:linear-gradient(to right,#0891b2,var(--cyan))"></div></div><div class="bar-count">${c}</div></div>`;
        }).join('')}
      </div>`:''}
    ${palaceCount>0?`
      <div class="card" style="margin-top:14px">
        <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;font-weight:600">Luci — Saraylar</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
          <div><div class="stat-value violet" style="font-size:28px">${palaceCount}</div><div class="stat-label" style="font-size:10px">Saray</div></div>
          <div><div class="stat-value cyan" style="font-size:28px">${totalRooms}</div><div class="stat-label" style="font-size:10px">Oda</div></div>
          <div><div class="stat-value gold" style="font-size:28px">${totalSpots}</div><div class="stat-label" style="font-size:10px">Nokta</div></div>
        </div>
      </div>`:''}`;
}

function renderGorevHistory(){
  const list=state.gorevler||[];
  if(list.length===0) return '';
  const map={kolay:'Kolay',orta:'Orta',zor:'Zor',cokzor:'Çok Zor'};
  const tmap=(typeof TYPE_MAP!=='undefined')?TYPE_MAP:{};
  const starred=list.filter(g=>g.starred);
  const rest=list.filter(g=>!g.starred);
  function itemHtml(g){
    const isStar=!!g.starred;
    const typeLabel = g.type ? (tmap[g.type]||g.type) : '';
    const typeChip = typeLabel ? '<span class="gorev-type-badge mini">'+typeLabel+'</span>' : '';
    return '<div class="gorev-history-item">'+
      '<div class="ghi-head">'+
        '<span class="gorev-badge mini diff-'+g.difficulty+'">'+(map[g.difficulty]||g.difficulty)+'</span>'+
        typeChip+
        '<span class="ghi-date">'+formatDate(g.ts)+'</span>'+
        '<button class="ghi-star'+(isStar?' active':'')+'" onclick="toggleStar(\''+g.id+'\')" title="'+(isStar?'Yıldızı kaldır':'Yıldızla')+'">'+(isStar?'★':'☆')+'</button>'+
        '<button class="ghi-delete" onclick="deleteGorev(\''+g.id+'\')" title="Sil">×</button>'+
      '</div>'+
      '<div class="ghi-text">'+escapeHtml(g.text)+'</div>'+
    '</div>';
  }
  let out='';
  // Yıldızlı görevler — açılır kutucuk
  if(starred.length>0){
    const openClass = _starredBoxOpen ? ' open' : '';
    out+='<div class="starred-box'+openClass+'" id="starredBox">'+
      '<button class="starred-box-header" onclick="toggleStarredBox()">'+
        '<span class="sbh-left"><span class="star-icon">★</span> Yıldızlı görevler</span>'+
        '<span class="sbh-right"><span class="count">'+starred.length+'</span><span class="chevron">▾</span></span>'+
      '</button>'+
      '<div class="starred-box-content">'+
        starred.map(itemHtml).join('')+
      '</div>'+
    '</div>';
  }
  if(rest.length>0){
    out+='<h3 class="section-title" style="margin-top:18px">Geçmiş egzersizler</h3>';
    out+=rest.slice(0,30).map(itemHtml).join('');
  }
  return out;
}

let _starredBoxOpen=false;
function toggleStarredBox(){
  _starredBoxOpen=!_starredBoxOpen;
  const box=document.getElementById('starredBox');
  if(box) box.classList.toggle('open', _starredBoxOpen);
}
window.toggleStarredBox=toggleStarredBox;

function toggleStar(id){
  if(!state.gorevler) return;
  const g=state.gorevler.find(x=>x.id===id);
  if(!g) return;
  g.starred=!g.starred;
  saveState();
  const w=document.getElementById('gorevHistoryWrap');
  if(w) w.innerHTML=renderGorevHistory();
  // Sonuç kartındaki yıldız butonunu da güncelle (varsa)
  const resStar=document.getElementById('resStarBtn_'+id);
  if(resStar){
    resStar.innerHTML=g.starred?'★ Yıldızlı':'☆ Yıldızla';
    resStar.classList.toggle('starred',g.starred);
  }
}
window.toggleStar=toggleStar;

function deleteGorev(id){
  if(!state.gorevler) return;
  state.gorevler=state.gorevler.filter(g=>g.id!==id);
  saveState();
  const w=document.getElementById('gorevHistoryWrap');
  if(w) w.innerHTML=renderGorevHistory();
}
window.deleteGorev=deleteGorev;

async function generateGorev(difficulty){
  _lastGorevDiff=difficulty;
  if(!state.gorevler) state.gorevler=[];
  const diff=GOREV_DIFFS.find(d=>d.id===difficulty);
  if(!diff) return;
  const resultEl=document.getElementById('gorevResult');
  if(!resultEl) return;
  document.querySelectorAll('.difficulty-chip').forEach(b=>b.disabled=true);
  resultEl.classList.remove('hidden');
  resultEl.innerHTML=`
    <div class="gorev-result-head">
      <span class="gorev-badge diff-${diff.id}">${diff.name}</span>
      <span style="color:var(--text-muted);font-size:12px">${diff.range}</span>
    </div>
    <div class="gorev-loading"><span class="spinner"></span><em>Sahne oluşturuluyor...</em></div>`;
  try{
    const result=await callGemini(diff);
    const text=result.text;
    const typeId=result.typeId||'sahne';
    const entry={id:'gv_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),difficulty:diff.id,type:typeId,text,ts:Date.now()};
    state.gorevler.unshift(entry);
    if(state.gorevler.length>30) state.gorevler=state.gorevler.slice(0,30);
    saveState();
    resultEl.innerHTML=`
      <div class="gorev-result-head">
        <div style="display:flex;gap:8px;align-items:center">
          <span class="gorev-badge diff-${diff.id}">${diff.name}</span>
          <span class="gorev-type-badge">${TYPE_MAP[typeId]||typeId}</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn-ghost star-btn" id="resStarBtn_${entry.id}" onclick="toggleStar('${entry.id}')">☆ Yıldızla</button>
          <button class="btn-ghost" onclick="generateGorev('${diff.id}')">↻ Yeni</button>
        </div>
      </div>
      <div class="gorev-result-text">${escapeHtml(text)}</div>`;
    const w=document.getElementById('gorevHistoryWrap');
    if(w) w.innerHTML=renderGorevHistory();
  }catch(err){
    resultEl.innerHTML=`
      <div class="gorev-result-head">
        <span class="gorev-badge diff-${diff.id}">${diff.name}</span>
        <button class="btn-ghost" onclick="generateGorev('${diff.id}')">↻ Tekrar</button>
      </div>
      <div class="gorev-error"><strong>Hata:</strong> ${escapeHtml(err.message||'bilinmeyen')}</div>`;
  }finally{
    document.querySelectorAll('.difficulty-chip').forEach(b=>b.disabled=false);
  }
}
window.generateGorev=generateGorev;

function _pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function _cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function _wc(s){ return s.trim().split(/\s+/).filter(Boolean).length; }
function _kapla(template){
  return template.replace(/\{(\w+)\}/g,(_,k)=>{
    const arr=IMAG[k]; return arr?_pick(arr):'';
  });
}
// Sesli uyum: locative -de/-te → -sin; -da/-ta → -sın
function _yerSin(yer){
  const tail=yer.slice(-2);
  if(tail==='de'||tail==='te') return yer+'sin';
  if(tail==='da'||tail==='ta') return yer+'sın';
  return yer+'sın';
}
function _baslangic(yer){
  const r=Math.random();
  if(r<0.40) return 'Kendini '+yer+' düşün.';
  if(r<0.75) return 'Kendini '+yer+' bul.';
  return _cap(_yerSin(yer))+'.';
}

function _buildKolay(){
  const yer=_pick(IMAG.yer);
  const gorsel=_cap(_pick(IMAG.gorsel));
  const ses=_cap(_pick(IMAG.ses));
  const dokun=_cap(_pick(IMAG.dokun));
  const sur=_cap(_pick(IMAG.surreal));
  const kap=_kapla(_pick(IMAG.kapanis_kolay));
  return _baslangic(yer)+' '+gorsel+'. '+ses+'. '+dokun+'. '+sur+'. '+kap;
}

function _buildOrta(){
  const yer=_pick(IMAG.yer);
  const gorsel=_cap(_pick(IMAG.gorsel));
  const ses=_cap(_pick(IMAG.ses));
  const koku=_cap(_pick(IMAG.koku));
  const dokun=_cap(_pick(IMAG.dokun));
  const sur1=_cap(_pick(IMAG.surreal));
  const sur2=_cap(_pick(IMAG.surreal));
  const gecis=_pick(IMAG.gecis);
  const kap=_kapla(_pick(IMAG.kapanis_kolay));
  return _baslangic(yer)+' '+gorsel+'. '+ses+'. '+koku+'. '+dokun+'. '+gecis+' '+sur1.toLowerCase()+'. '+sur2+'. '+kap;
}

function _buildZor(){
  const yer=_pick(IMAG.yer);
  const gorsel=_cap(_pick(IMAG.gorsel));
  const ses=_cap(_pick(IMAG.ses));
  const koku=_cap(_pick(IMAG.koku));
  const dokun=_cap(_pick(IMAG.dokun));
  const tat=_cap(_pick(IMAG.tat));
  const sur1=_cap(_pick(IMAG.surreal));
  const sur2=_cap(_pick(IMAG.surreal));
  const sur3=_cap(_pick(IMAG.surreal));
  const gecis1=_pick(IMAG.gecis), gecis2=_pick(IMAG.gecis);
  const kap=_kapla(_pick(IMAG.kapanis_zor));
  return _baslangic(yer)+' '+gorsel+'; aynı anda '+ses.toLowerCase()+'. '+koku+', '+dokun.toLowerCase()+'. '+gecis1+' '+sur1.toLowerCase()+'. '+gecis2+' '+sur2.toLowerCase()+'. '+tat+'. '+sur3+'. '+kap;
}

function _buildCokZor(){
  const yer1=_pick(IMAG.yer), yer2=_pick(IMAG.yer), yer3=_pick(IMAG.yer);
  const gorsel1=_cap(_pick(IMAG.gorsel)), gorsel2=_cap(_pick(IMAG.gorsel)), gorsel3=_cap(_pick(IMAG.gorsel));
  const ses1=_cap(_pick(IMAG.ses)), ses2=_cap(_pick(IMAG.ses));
  const koku=_cap(_pick(IMAG.koku));
  const dokun1=_cap(_pick(IMAG.dokun));
  const tat=_cap(_pick(IMAG.tat));
  const sur1=_cap(_pick(IMAG.surreal)), sur2=_cap(_pick(IMAG.surreal)), sur3=_cap(_pick(IMAG.surreal));
  const gecis1=_pick(IMAG.gecis), gecis2=_pick(IMAG.gecis), gecis3=_pick(IMAG.gecis);
  const duygu1=_pick(IMAG.duygu), duygu2=_pick(IMAG.duygu);
  const kap=_kapla(_pick(IMAG.kapanis_zor));
  // Opsiyonel parçalar
  const optDuygu = Math.random()<0.6 ? ('İçinden bir '+duygu1+' yumuşakça geçiyor. ') : '';
  const optDokun = Math.random()<0.5 ? (_cap(_pick(IMAG.dokun))+'. ') : '';
  const optYavas = Math.random()<0.5 ? 'Her şey yavaşlıyor; ışık nefesine göre titriyor. ' : '';
  return _baslangic(yer1)+' '+gorsel1+'; aynı anda '+ses1.toLowerCase()+'. '+koku+', '+dokun1.toLowerCase()+'. '+gecis1+' '+sur1.toLowerCase()+'. '+optDuygu+'Sahne yavaşça kıvrılıyor — şimdi '+_yerSin(yer2)+'. '+gorsel2+', '+ses2.toLowerCase()+'. '+tat+'. '+optDokun+gecis2+' '+sur2.toLowerCase()+'. '+optYavas+gecis3+' '+sur3.toLowerCase()+', içinde '+duygu2+' büyürken. Sahne bir kez daha dönüyor; şimdi '+_yerSin(yer3)+'. '+gorsel3+'. '+kap;
}

function _buildSahne(diff){
  const map={kolay:_buildKolay,orta:_buildOrta,zor:_buildZor,cokzor:_buildCokZor};
  return (map[diff.id]||_buildKolay)();
}

  s+=`${_cap(_pick(v.giysi))}. `;
  s+=`${_cap(_pick(v.gozler))}. `;

    s+=`${_cap(_pick(v.detay))}. `;

  }
  s+=`${_cap(_pick(v.detay))}. `;

  s+=`Birden seni dinlediğini fark ediyorsun, ama yorum yapmıyor. `;

const TYPES = [
  {id:'sahne', name:'Sahne', build:_buildSahne},
  {id:'insan', name:'İnsan', build:_buildInsan},
  {id:'nesne', name:'Nesne', build:_buildNesne},
  {id:'doga', name:'Doğa', build:_buildDoga},
  {id:'konusma', name:'Konuşma', build:_buildKonusma},
  {id:'yuz', name:'Yüz', build:_buildYuz},
  {id:'ses', name:'Ses', build:_buildSes}
];
const TYPE_MAP={sahne:'Sahne',insan:'İnsan',nesne:'Nesne',doga:'Doğa',konusma:'Konuşma',yuz:'Yüz',ses:'Ses'};

async function callGemini(diff){
  let best='', bestDelta=Infinity, bestType=TYPES[0];
  for(let i=0;i<10;i++){
    const type = TYPES[Math.floor(Math.random()*TYPES.length)];
    const cand = type.build(diff);
    const wc = _wc(cand);
    if(wc>=diff.min && wc<=diff.max) return {text: cand, typeId: type.id};
    const delta = wc<diff.min ? (diff.min-wc) : (wc-diff.max);
    if(delta<bestDelta){ bestDelta=delta; best=cand; bestType=type; }
  }
  return {text: best, typeId: bestType.id};
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`onirea-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Dışa aktarıldı','success');
}

function confirmClearAll(){
  showConfirm('Tüm verilerini sil?','Tüm rüyalar, saraylar, ayarlar silinecek. Bu işlem geri alınamaz.',()=>{
    state=structuredClone(defaultState);
    saveState(); closeModal();
    renderSettingsPanel(document.getElementById('panelBody'));
    toast('Her şey silindi');
  });
}

function showModal({title,body,foot,onMounted,size}){
  const m=document.getElementById('modal');
  m.innerHTML=`
    <div class="modal ${size==='sm'?'modal-sm':''}">
      <div class="modal-head">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">${body}</div>
      ${foot?`<div class="modal-foot">${foot}</div>`:''}
    </div>`;
  m.classList.add('show');
  m.onclick=e=>{ if(e.target===m) closeModal(); };
  if(onMounted) setTimeout(onMounted,30);
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal').innerHTML='';
}
function showConfirm(title,desc,onYes){
  showModal({
    size:'sm',
    title,
    body:desc?`<div style="color:var(--text-muted);line-height:1.6;font-size:14px">${escapeHtml(desc)}</div>`:'',
    foot:`<button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-danger" id="confirmYes">Evet, sil</button>`,
    onMounted:()=>{ document.getElementById('confirmYes').onclick=onYes; }
  });
}

// ===== INIT =====
function init(){
  // Hide loader
  setTimeout(()=>document.getElementById('loader').classList.add('hide'),400);

  // Panel close button
  document.getElementById('panelClose').onclick=closePanel;
  // Settings gear
  document.getElementById('settingsGear').onclick=()=>openSection('settings');

  // UI mode (telefon / bilgisayar) — first-time auto detect, then sticky
  if(!state.settings.uiMode){
    state.settings.uiMode=matchMedia('(hover:none) and (pointer:coarse)').matches?'phone':'computer';
    saveState();
  }
  applyUIMode(state.settings.uiMode);
  document.querySelectorAll('#modeToggle button').forEach(b=>{
    b.addEventListener('click',()=>applyUIMode(b.dataset.mode));
  });

  // Start RC timer if enabled
  if(state.settings.rcEnabled) startRCTimer();
}

function applyUIMode(mode){
  document.body.classList.remove('is-phone','is-computer');
  document.body.classList.add('is-'+mode);
  document.querySelectorAll('#modeToggle button').forEach(b=>{
    b.classList.toggle('active',b.dataset.mode===mode);
  });
  state.settings.uiMode=mode;
  saveState();
  // Mod değişiminde dokunma durumunu sıfırla
  joystickActive=false; joystickTouchId=null;
  joystickInputX=0; joystickInputY=0;
  lookTouchId=null;
  const jc=document.getElementById('joystickContainer');
  if(jc) jc.classList.remove('active');
  if(renderer) onResize();
}

// Boot when DOM ready
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',()=>{ if(init3D()) init(); });
} else {
  if(init3D()) init();
}
